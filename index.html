<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YID PLUS — Sign In</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* סטילינג */
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --gold: #C9A84C; --gold-light: #F0D080; --gold-dark: #8B6914; --bg: #0A0A0F; --bg-card: #13131A; --bg-input: #1C1C26; --border: rgba(201,168,76,0.25); --border-hover: rgba(201,168,76,0.6); --text: #F0EDE6; --muted: #8A8070; --red: #E24B4A; --green: #1D9E75; }
body { background: var(--bg); font-family: Georgia, serif; color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; position: relative; overflow: hidden; }
canvas#stars-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.wrap { position: relative; z-index: 1; width: 100%; max-width: 400px; }
.card { background: var(--bg-card); border: 0.5px solid var(--border); border-radius: 18px; padding: 2rem 1.75rem; width: 100%; }
.tabs { display: flex; background: var(--bg-input); border-radius: 10px; padding: 3px; margin-bottom: 1.75rem; }
.tab { flex: 1; padding: 0.5rem; text-align: center; font-size: 0.82rem; cursor: pointer; color: var(--muted); border: none; background: transparent; }
.tab.active { background: var(--bg-card); color: var(--gold); border: 0.5px solid var(--border); }
.form-group { margin-bottom: 1rem; }
input { width: 100%; padding: 0.72rem 1rem; background: var(--bg-input); border: 0.5px solid var(--border); border-radius: 8px; color: var(--text); }
.btn { width: 100%; padding: 0.85rem; background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: #1a1208; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; }
.msg { display: none; padding: 0.7rem 1rem; border-radius: 8px; margin-bottom: 1rem; }
</style>
</head>
<body>
<canvas id="stars-bg"></canvas>

<div class="wrap">
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <div class="msg" id="msg"></div>

    <div id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="l-email" placeholder="your@email.com">
      </div>
      <button class="btn" onclick="doLogin()">Sign In</button>
    </div>

    <div id="reg-form" style="display:none">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="r-email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Nickname</label>
        <input type="text" id="r-nick" placeholder="YidUser123">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="r-pass" placeholder="Min 6 characters">
      </div>
      <button class="btn" onclick="doRegister()">Create Account</button>
    </div>
  </div>
</div>

<script>
/* ── UI HELPERS ── */
function switchTab(t) {
  document.getElementById('login-form').style.display = t==='login'?'block':'none';
  document.getElementById('reg-form').style.display = t==='register'?'block':'none';
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (i===0&&t==='login')||(i===1&&t==='register')));
}
</script>

<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/home.js"></script>
<script src="js/admin.js"></script>
</body>
  </html>
