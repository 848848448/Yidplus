<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0A0A0F">
<title>👑 YID PLUS</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--gold:#C9A84C;--gold-l:#F0D080;--gold-d:#8B6914;--bg:#0A0A0F;--bg2:#13131A;--bg3:#1C1C26;--bg4:#222230;--border:rgba(201,168,76,.18);--border2:rgba(201,168,76,.45);--text:#F0EDE6;--muted:#8A8070;--muted2:#5A5448;--red:#E24B4A;--green:#1D9E75;--blue:#378ADD;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:Georgia,serif;color:var(--text);-webkit-font-smoothing:antialiased;}
body.night{--bg:#050508;--bg2:#0A0A10;--bg3:#111118;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);transform:translateX(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);pointer-events:none;overflow:hidden;}
.screen.active{transform:translateX(0);pointer-events:all;}
.screen.prev{transform:translateX(-30%);}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;}
.scroll-area::-webkit-scrollbar{display:none;}
.topbar{background:rgba(10,10,15,.97);border-bottom:.5px solid var(--border);padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;backdrop-filter:blur(12px);}
.topbar-logo{font-size:1.1rem;font-weight:700;letter-spacing:.1em;background:linear-gradient(135deg,var(--gold-l),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.icon-btn{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;transition:all .2s;position:relative;flex-shrink:0;}
.icon-btn:active{transform:scale(.88);}
.badge{position:absolute;top:-2px;right:-2px;width:14px;height:14px;border-radius:50%;background:var(--red);font-size:.55rem;color:#fff;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--bg);}
.bottom-nav{background:rgba(10,10,15,.97);backdrop-filter:blur(12px);border-top:.5px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:.6rem 0 max(.6rem,env(safe-area-inset-bottom));flex-shrink:0;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:.2rem;cursor:pointer;padding:.3rem .75rem;flex:1;border:none;background:none;font-family:inherit;}
.nav-icon{font-size:1.2rem;}
.nav-label{font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.nav-item.active .nav-label{color:var(--gold);}
.field{width:100%;padding:.72rem 1rem;background:var(--bg3);border:.5px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;font-family:inherit;outline:none;transition:border .2s;margin-bottom:.85rem;display:block;}
.field:focus{border-color:var(--border2);}
.field::placeholder{color:var(--muted);}
.btn-primary{width:100%;padding:.82rem;background:linear-gradient(135deg,var(--gold-d),var(--gold));color:#1a1208;font-size:.88rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:10px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:.5rem;min-height:46px;}
.btn-primary:active{transform:scale(.97);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.loading-dots{display:none;gap:4px;align-items:center;}
.loading-dots span{width:6px;height:6px;background:#1a1208;border-radius:50%;animation:ldot .9s infinite;}
.loading-dots span:nth-child(2){animation-delay:.2s;}
.loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes ldot{0%,80%,100%{transform:scale(.6);opacity:.5}40%{transform:scale(1);opacity:1}}
.toggle-sw{width:42px;height:24px;border-radius:12px;background:var(--bg3);border:.5px solid var(--border);position:relative;cursor:pointer;transition:background .25s;flex-shrink:0;}
.toggle-sw.on{background:var(--gold-d);border-color:var(--gold);}
.toggle-sw::after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;background:var(--muted);top:2px;left:2px;transition:all .22s;}
.toggle-sw.on::after{left:20px;background:var(--gold-l);}
.modal-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.75);display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--bg2);border:.5px solid var(--border);border-radius:20px 20px 0 0;padding:1.5rem 1.5rem max(1.5rem,env(safe-area-inset-bottom));width:100%;max-width:500px;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:.95rem;font-weight:700;margin-bottom:1.25rem;text-align:center;}
.modal-cancel{width:100%;padding:.65rem;background:transparent;border:.5px solid rgba(255,255,255,.08);border-radius:10px;color:var(--muted);font-size:.82rem;cursor:pointer;font-family:inherit;margin-top:.5rem;}
#app-toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);background:rgba(19,19,26,.97);border:.5px solid var(--border2);border-radius:10px;padding:.6rem 1.25rem;font-size:.8rem;color:var(--gold-l);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
#app-toast.show{opacity:1;}
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:1rem .75rem .5rem;}
.section-hdr h2{font-size:.88rem;letter-spacing:.04em;}
.see-all{font-size:.73rem;color:var(--gold);cursor:pointer;border:none;background:none;font-family:inherit;}
.h-scroll{display:flex;gap:.75rem;overflow-x:auto;scrollbar-width:none;}
.h-scroll::-webkit-scrollbar{display:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
.feed-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1rem;gap:.75rem;color:var(--muted);text-align:center;}
.feed-retry{padding:.5rem 1.25rem;background:var(--gold-d);border:none;border-radius:8px;color:#1a1208;font-size:.8rem;cursor:pointer;font-family:inherit;margin-top:.25rem;}
/* AUTH */
#screen-auth{justify-content:center;align-items:center;padding:1.5rem;overflow-y:auto;}
.auth-card{background:var(--bg2);border:.5px solid var(--border);border-radius:18px;padding:2rem 1.75rem;width:100%;max-width:400px;animation:fadeIn .7s ease;}
.auth-tabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:1.75rem;}
.auth-tab{flex:1;padding:.5rem;text-align:center;font-size:.82rem;border-radius:8px;cursor:pointer;color:var(--muted);border:none;background:transparent;font-family:inherit;transition:all .25s;}
.auth-tab.active{background:var(--bg2);color:var(--gold);border:.5px solid var(--border);}
.auth-msg{padding:.65rem 1rem;border-radius:8px;font-size:.82rem;margin-bottom:1rem;display:none;align-items:center;gap:.5rem;}
.auth-msg.err{background:rgba(226,75,74,.1);border:.5px solid var(--red);color:#F09595;display:flex;}
.auth-msg.ok{background:rgba(29,158,117,.1);border:.5px solid var(--green);color:#5DCAA5;display:flex;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
/* STATUS */
.status-item{display:flex;flex-direction:column;align-items:center;gap:.4rem;cursor:pointer;flex-shrink:0;}
.status-ring{width:60px;height:60px;border-radius:50%;padding:2.5px;background:conic-gradient(var(--gold-l),var(--gold),var(--gold-d),var(--gold-l));}
.status-ring.viewed{background:conic-gradient(#444,#555,#444);}
.status-ring.mine{background:conic-gradient(var(--blue),#5DCAA5,var(--blue));}
.status-inner{width:100%;height:100%;border-radius:50%;background:var(--bg3);border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:1.4rem;position:relative;}
.status-plus{position:absolute;bottom:0;right:0;width:18px;height:18px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#1a1208;font-weight:900;border:1.5px solid var(--bg);}
.status-name{font-size:.62rem;color:var(--muted);max-width:62px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* ADS */
.ad-frame{width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;border:.5px solid var(--border);position:relative;cursor:pointer;background:var(--bg2);}
.ad-slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.5rem;padding:1.5rem;opacity:0;transition:opacity .6s ease;}
.ad-slide.active{opacity:1;}
.ad-badge{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;padding:.2rem .6rem;border-radius:20px;background:rgba(201,168,76,.15);color:var(--gold);border:.5px solid var(--border2);}
#ad-prog{position:absolute;bottom:0;left:0;height:2px;background:var(--gold);}
.ad-dot{width:6px;height:6px;border-radius:50%;background:var(--muted2);transition:all .3s;}
.ad-dot.active{background:var(--gold);width:16px;border-radius:3px;}
/* FEED */
.short-prev{flex-shrink:0;width:110px;height:185px;border-radius:12px;background:var(--bg2);border:.5px solid var(--border);overflow:hidden;position:relative;cursor:pointer;}
.ch-prev-card{flex-shrink:0;width:130px;background:var(--bg2);border:.5px solid var(--border);border-radius:14px;padding:.9rem .75rem;text-align:center;cursor:pointer;}
.follow-pill{margin-top:.5rem;width:100%;padding:.3rem;background:rgba(201,168,76,.1);border:.5px solid var(--border);border-radius:6px;color:var(--gold);font-size:.7rem;cursor:pointer;font-family:inherit;}
.follow-pill.following{background:var(--gold-d);border-color:var(--gold);color:#1a1208;}
.feed-post{background:var(--bg2);border:.5px solid var(--border);border-radius:14px;margin-bottom:.75rem;overflow:hidden;}
.post-thumb{height:160px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:4rem;cursor:pointer;position:relative;}
.post-play{position:absolute;width:50px;height:50px;border-radius:50%;background:rgba(201,168,76,.85);display:flex;align-items:center;justify-content:center;font-size:1.3rem;}
.post-action{display:flex;align-items:center;gap:.3rem;font-size:.78rem;color:var(--muted);cursor:pointer;border:none;background:none;font-family:inherit;padding:.2rem .3rem;}
.post-action.liked{color:var(--red);}
/* STATUS VIEWER */
.sv-overlay{position:fixed;inset:0;z-index:200;background:#000;display:none;flex-direction:column;}
.sv-overlay.open{display:flex;}
.sv-header{position:absolute;top:0;left:0;right:0;z-index:10;padding:1rem 1rem 0;}
.sv-bars{display:flex;gap:3px;margin-bottom:.75rem;}
.sv-bar{flex:1;height:2.5px;background:rgba(255,255,255,.25);border-radius:2px;overflow:hidden;}
.sv-bar-fill{height:100%;background:#fff;width:0;}
.sv-bar-fill.done{width:100%;}
.sv-bar-fill.running{animation:barRun 5s linear forwards;}
@keyframes barRun{from{width:0}to{width:100%}}
.sv-ctrl{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.4);border:none;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sv-slide{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;padding:5rem 1.5rem;text-align:center;transition:opacity .15s;}
/* STATUS UPLOAD */
.status-bg-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.status-bg-swatch.active{border-color:var(--gold);transform:scale(1.1);}
</style>
</head>
<body>

<!-- ══ AUTH ══ -->
<div class="screen active" id="screen-auth">
  <div style="margin:auto;width:100%;max-width:400px;padding:1.5rem;animation:fadeIn .7s ease">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:2.8rem;filter:drop-shadow(0 0 18px rgba(201,168,76,.5))">👑</div>
      <div style="font-size:2rem;font-weight:700;letter-spacing:.14em;background:linear-gradient(135deg,var(--gold-l),var(--gold),var(--gold-d));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">YID PLUS</div>
      <div style="font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-top:.25rem">Jewish Entertainment Platform</div>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="authTab('login')">Sign In</button>
        <button class="auth-tab" onclick="authTab('register')">Register</button>
      </div>
      <div class="auth-msg" id="auth-msg"></div>
      <div id="auth-login">
        <input class="field" type="email" id="l-email" placeholder="Email address">
        <input class="field" type="password" id="l-pass" placeholder="Password">
        <div style="display:flex;align-items:center;justify-content:space-between;margin:.25rem 0 1.1rem">
          <label style="display:flex;align-items:center;gap:.5rem;font-size:.8rem;color:var(--muted);cursor:pointer" onclick="toggleRemember()">
            <div class="toggle-sw" id="rem-tog"></div> Remember Me
          </label>
          <span style="font-size:.78rem;color:var(--gold);cursor:pointer">Forgot password?</span>
        </div>
        <button class="btn-primary" id="l-btn" onclick="doLogin()">
          <span id="l-txt">Sign In</span>
          <div class="loading-dots" id="l-dots"><span></span><span></span><span></span></div>
        </button>
      </div>
      <div id="auth-register" style="display:none">
        <input class="field" type="email" id="r-email" placeholder="Email address">
        <div class="field-row" style="margin-bottom:.85rem">
          <input class="field" style="margin-bottom:0" id="r-nick" placeholder="Nickname">
          <input class="field" style="margin-bottom:0" type="tel" id="r-phone" placeholder="Phone (private)">
        </div>
        <input class="field" type="password" id="r-pass" placeholder="Password (min 6)">
        <input class="field" type="password" id="r-pass2" placeholder="Confirm password">
        <button class="btn-primary" id="r-btn" onclick="doRegister()">
          <span id="r-txt">Create Account</span>
          <div class="loading-dots" id="r-dots"><span></span><span></span><span></span></div>
        </button>
      </div>
      <div style="background:rgba(201,168,76,.05);border:.5px solid var(--border);border-radius:10px;padding:.85rem 1rem;margin-top:1.25rem;font-size:.72rem;color:var(--muted)">
        🔗 Powered by <strong style="color:var(--gold)">Supabase</strong>
      </div>
    </div>
  </div>
</div>

<!-- ══ HOME ══ -->
<div class="screen" id="screen-home">
  <div class="topbar">
    <div class="topbar-logo">👑 YID PLUS</div>
    <div style="display:flex;gap:.5rem">
      <div class="icon-btn" onclick="toast('Search')">🔍</div>
      <div class="icon-btn" style="position:relative" onclick="goPage('chat.html')">🔔<div class="badge" id="notif-badge" style="display:none">3</div></div>
      <div class="icon-btn" onclick="goPage('settings.html')">👤</div>
    </div>
  </div>
  <div class="scroll-area" style="padding-bottom:80px">
    <div id="broadcast-bar"></div>
    <div style="padding:.75rem .75rem .25rem">
      <div style="font-size:.63rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem">Status Updates</div>
      <div class="h-scroll" id="status-row"></div>
    </div>
    <div style="padding:.6rem .75rem">
      <div style="font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted2);margin-bottom:.35rem;text-align:right">Sponsored</div>
      <div class="ad-frame" id="ad-frame"><div id="ad-prog"></div></div>
      <div style="display:flex;gap:5px;justify-content:center;margin-top:.4rem" id="ad-dots"></div>
    </div>
    <div class="section-hdr"><h2>🎬 Trending Shorts</h2><button class="see-all" onclick="goPage('yidplus-shorts.html')">See All →</button></div>
    <div class="h-scroll" style="padding:0 .75rem .5rem" id="home-shorts"></div>
    <div class="section-hdr"><h2>⭐ Featured Channels</h2><button class="see-all" onclick="toast('Browse all')">See All →</button></div>
    <div class="h-scroll" style="padding:0 .75rem .5rem" id="home-channels"></div>
    <div class="section-hdr"><h2>📰 Latest Posts</h2></div>
    <div style="padding:0 .75rem" id="home-feed"></div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="navTo('home')"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></button>
    <button class="nav-item" onclick="goPage('yidplus-shorts.html')"><span class="nav-icon">🎬</span><span class="nav-label">Shorts</span></button>
    <button class="nav-item" onclick="goPage('yidplus-music.html')"><span class="nav-icon">🎵</span><span class="nav-label">Music</span></button>
    <button class="nav-item" onclick="goPage('yidplus-chat.html')"><span class="nav-icon">💬</span><span class="nav-label">Chats</span></button>
    <button class="nav-item" onclick="goPage('yidplus-admin.html')"><span class="nav-icon">⚙️</span><span class="nav-label">Admin</span></button>
  </nav>
</div>

<!-- ══ STATUS VIEWER ══ -->
<div class="sv-overlay" id="sv-overlay">
  <div class="sv-header">
    <div class="sv-bars" id="sv-bars"></div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:.6rem">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:1rem" id="sv-avatar"></div>
        <div>
          <div style="font-size:.85rem;font-weight:700;color:#fff" id="sv-nick"></div>
          <div style="font-size:.65rem;color:rgba(255,255,255,.6)" id="sv-time"></div>
        </div>
      </div>
      <div style="display:flex;gap:.4rem">
        <button class="sv-ctrl" id="sv-mute-btn" onclick="svToggleMute()">🔊</button>
        <button class="sv-ctrl" onclick="closeSV()">✕</button>
      </div>
    </div>
  </div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;position:relative">
    <div style="position:absolute;left:0;top:0;bottom:0;width:40%;z-index:5" onclick="svPrev()"></div>
    <div style="position:absolute;right:0;top:0;bottom:0;width:40%;z-index:5" onclick="svNext()"></div>
    <div class="sv-slide" id="sv-slide"></div>
  </div>
  <div style="position:absolute;bottom:0;left:0;right:0;padding:1rem;display:flex;align-items:center;gap:.75rem;background:linear-gradient(to top,rgba(0,0,0,.7),transparent)">
    <input style="flex:1;padding:.55rem 1rem;background:rgba(255,255,255,.1);border:.5px solid rgba(255,255,255,.2);border-radius:20px;color:#fff;font-size:.82rem;font-family:inherit;outline:none" placeholder="Reply..." id="sv-reply-input">
    <div style="font-size:1.5rem;cursor:pointer" id="sv-like-btn" onclick="svLike()">🤍</div>
  </div>
</div>

<!-- ══ STATUS UPLOAD MODAL ══ -->
<div class="modal-overlay" id="status-modal" onclick="if(event.target===this)closeStatusModal()">
  <div class="modal-sheet">
    <div class="modal-title">📸 Add a Status</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem">
      <div style="background:rgba(255,255,255,.04);border:.5px solid rgba(201,168,76,.2);border-radius:12px;padding:1.25rem .75rem;text-align:center;cursor:pointer" onclick="switchStatusType('text')">
        <div style="font-size:2rem;margin-bottom:.4rem">✏️</div><div style="font-size:.78rem;color:var(--muted)">Text Status</div>
      </div>
      <div style="background:rgba(255,255,255,.04);border:.5px solid rgba(201,168,76,.2);border-radius:12px;padding:1.25rem .75rem;text-align:center;cursor:pointer" onclick="document.getElementById('status-file-input').click()">
        <div style="font-size:2rem;margin-bottom:.4rem">🖼️</div><div style="font-size:.78rem;color:var(--muted)">Photo / Video</div>
      </div>
    </div>
    <div id="status-text-panel" style="display:none">
      <textarea class="field" id="status-text-content" placeholder="What's on your mind?" rows="3" style="resize:none;height:auto;margin-bottom:.5rem"></textarea>
      <div style="font-size:.72rem;color:var(--muted);margin-bottom:.4rem">Background:</div>
      <div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.75rem" id="status-bg-row"></div>
    </div>
    <div id="status-media-panel" style="display:none;text-align:center;padding:1rem;font-size:.85rem;color:var(--muted)">✅ Media selected</div>
    <button class="btn-primary" onclick="submitStatus()" style="margin-bottom:.5rem">Post Status</button>
    <button class="modal-cancel" onclick="closeStatusModal()">Cancel</button>
    <input type="file" id="status-file-input" accept="image/*,video/*" style="display:none" onchange="onStatusFileSelected(event)">
  </div>
</div>

<!-- ══ EDIT PROFILE MODAL ══ -->
<div class="modal-overlay" id="edit-profile-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal-sheet">
    <div class="modal-title">✏️ Edit Profile</div>
    <input class="field" id="edit-nick" placeholder="Nickname">

  var t=p.created_at?timeAgo(p.created_at):'';
  var emoji='🎬';try{if(p.content&&/\p{Emoji}/u.test(p.content))emoji=p.content;}catch(e){}
  a.innerHTML='<div style="display:flex;align-items:center;gap:.6rem;padding:.75rem;cursor:pointer"><div style="width:38px;height:38px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.1rem;border:1px solid var(--border)">'+escHtml(nick.charAt(0).toUpperCase())+'</div><div><div style="font-size:.85rem;font-weight:700">@'+escHtml(nick)+'</div><div style="font-size:.65rem;color:var(--muted)">'+escHtml(t)+'</div></div></div><div class="post-thumb" onclick="toast(\'Opening post...\')">'+emoji+'<div class="post-play">▶</div></div>'+(caption?'<div style="padding:.6rem .75rem;font-size:.82rem;color:var(--muted);border-bottom:.5px solid var(--border)">'+escHtml(caption)+'</div>':'')+'<div style="display:flex;gap:1rem;padding:.75rem"><button class="post-action" id="lk-'+p.id+'" onclick="likePost(this,\''+p.id+'\','+likes+')">🤍 '+fmtN(likes)+'</button><button class="post-action" onclick="toast(\'Comments coming soon\')">💬 '+fmtN(cmts)+'</button><button class="post-action" onclick="toast(\'Link copied!\')">📤 Share</button>'+(isAnyAdmin()?'<button class="post-action" style="color:var(--red);margin-left:auto" onclick="deletePost(\''+p.id+'\')">🗑 Delete</button>':'')+'</div>';
  return a;
}
function likePost(btn,id,cur){var liked=btn.classList.toggle('liked');var n=liked?cur+1:cur;btn.innerHTML=(liked?'❤️ ':'🤍 ')+fmtN(n);sb.from('posts').update({likes:n}).eq('id',id);}
function deletePost(id){if(!confirm('Delete this post?'))return;sb.from('posts').delete().eq('id',id).then(function(r){if(r.error)return toast('❌ '+r.error.message);var el=document.querySelector('[data-id="'+id+'"]');if(el)el.remove();toast('🗑 Deleted.');}); }

// ── PAGE LOAD ──
document.addEventListener('DOMContentLoaded',function(){
  var saved=localStorage.getItem('yp_remember');
  if(saved){var el=document.getElementById('l-email');if(el){el.value=saved;AUTH_remMe=true;}var tog=document.getElementById('rem-tog');if(tog)tog.classList.add('on');}
  var lp=document.getElementById('l-pass');if(lp)lp.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  sb.auth.getSession().then(function(r){
    if(r.data&&r.data.session){
      AUTH_loadProfile(r.data.session.user).then(function(){navTo('home');initHome();});
    } else {navTo('auth');}
  });
});
</script>
