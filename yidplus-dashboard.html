<!DOCTYPE html>
<html lang="en">
<head>
  <script src="supabase/client.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>YID PLUS — Home</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#C9A84C;--gold-l:#F0D080;--gold-d:#8B6914;
  --bg:#0A0A0F;--bg2:#13131A;--bg3:#1C1C26;
  --border:rgba(201,168,76,0.18);--border2:rgba(201,168,76,0.45);
  --text:#F0EDE6;--muted:#8A8070;--muted2:#5A5448;
  --red:#E24B4A;--green:#1D9E75;--blue:#378ADD;
}
body{background:var(--bg);color:var(--text);font-family:Georgia,serif;min-height:100vh;overflow-x:hidden;}

/* ─── TOP NAV ─── */
.topnav{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,15,0.92);
  backdrop-filter:blur(12px);
  border-bottom:0.5px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0.75rem 1rem;
}
.topnav-logo{
  font-size:1.2rem;font-weight:700;letter-spacing:0.1em;
  background:linear-gradient(135deg,var(--gold-l),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:flex;align-items:center;gap:0.35rem;
}
.topnav-logo span{font-size:1.1rem;}
.topnav-icons{display:flex;gap:0.6rem;}
.icon-btn{
  width:36px;height:36px;border-radius:50%;background:var(--bg3);
  border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1rem;transition:all 0.2s;position:relative;
}
.icon-btn:hover{border-color:var(--border2);}
.badge{
  position:absolute;top:-2px;right:-2px;
  width:14px;height:14px;background:var(--red);border-radius:50%;
  font-size:0.55rem;font-family:sans-serif;color:#fff;
  display:flex;align-items:center;justify-content:center;border:1.5px solid var(--bg);
}

/* ─── SCROLL CONTAINER ─── */
.feed{overflow-y:auto;height:calc(100vh - 56px);padding-bottom:80px;}

/* ─── STATUS ROW ─── */
.status-section{padding:1rem 0.75rem 0.5rem;}
.status-label{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:0.75rem;}
.status-row{display:flex;gap:0.75rem;overflow-x:auto;padding-bottom:0.5rem;scrollbar-width:none;}
.status-row::-webkit-scrollbar{display:none;}
.status-item{display:flex;flex-direction:column;align-items:center;gap:0.4rem;cursor:pointer;flex-shrink:0;}
.status-ring{
  width:60px;height:60px;border-radius:50%;padding:2.5px;
  background:conic-gradient(var(--gold-l),var(--gold),var(--gold-d),var(--gold-l));
  transition:transform 0.18s;
}
.status-ring:hover{transform:scale(1.07);}
.status-ring.viewed{background:conic-gradient(#444,#555,#444);}
.status-ring.mine{background:conic-gradient(var(--blue),#5DCAA5,var(--blue));}
.status-inner{
  width:100%;height:100%;border-radius:50%;
  background:var(--bg3);border:2px solid var(--bg);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;position:relative;
}
.status-inner img{width:100%;height:100%;object-fit:cover;}
.status-plus{
  position:absolute;bottom:0;right:0;
  width:18px;height:18px;background:var(--gold);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:0.7rem;color:#1a1208;font-weight:900;border:1.5px solid var(--bg);
}
.status-name{font-size:0.62rem;color:var(--muted);max-width:62px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ─── STATUS VIEWER ─── */
.status-viewer{
  position:fixed;inset:0;z-index:200;background:#000;
  display:none;flex-direction:column;
}
.status-viewer.open{display:flex;}
.sv-header{
  position:absolute;top:0;left:0;right:0;z-index:10;
  padding:1rem 1rem 0;
}
.sv-bars{display:flex;gap:3px;margin-bottom:0.75rem;}
.sv-bar{
  flex:1;height:2.5px;background:rgba(255,255,255,0.25);border-radius:2px;overflow:hidden;
}
.sv-bar-fill{height:100%;background:#fff;width:0%;transition:none;}
.sv-bar-fill.done{width:100%;}
.sv-bar-fill.active{animation:barfill linear forwards;}
@keyframes barfill{from{width:0%}to{width:100%}}
.sv-top{display:flex;align-items:center;justify-content:space-between;}
.sv-user{display:flex;align-items:center;gap:0.6rem;}
.sv-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--gold);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1rem;}
.sv-info{display:flex;flex-direction:column;}
.sv-nick{font-size:0.85rem;font-weight:700;color:#fff;}
.sv-time{font-size:0.65rem;color:rgba(255,255,255,0.6);}
.sv-actions{display:flex;gap:0.5rem;}
.sv-mute,.sv-close{
  width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.4);
  border:none;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.sv-content{flex:1;display:flex;align-items:center;justify-content:center;position:relative;user-select:none;}
.sv-tap-left{position:absolute;left:0;top:0;bottom:0;width:40%;z-index:5;}
.sv-tap-right{position:absolute;right:0;top:0;bottom:0;width:40%;z-index:5;}
.sv-slide{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;padding:5rem 1.5rem;text-align:center;
  transition:opacity 0.15s;
}
.sv-footer{
  position:absolute;bottom:0;left:0;right:0;
  padding:1rem;display:flex;align-items:center;gap:0.75rem;z-index:10;
  background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);
}
.sv-reply{
  flex:1;padding:0.55rem 1rem;background:rgba(255,255,255,0.1);
  border:0.5px solid rgba(255,255,255,0.2);border-radius:20px;
  color:#fff;font-size:0.82rem;font-family:inherit;outline:none;
}
.sv-reply::placeholder{color:rgba(255,255,255,0.5);}
.sv-heart-btn{font-size:1.5rem;cursor:pointer;transition:transform 0.15s;}
.sv-heart-btn:hover{transform:scale(1.2);}
.views-btn{
  position:absolute;bottom:70px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.5);border:0.5px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.7);font-size:0.72rem;padding:0.3rem 0.8rem;
  border-radius:12px;cursor:pointer;display:none;border-top:none;font-family:inherit;
}
.views-btn.mine{display:block;}

/* ─── AD BANNER ─── */
.ad-section{padding:0.75rem;}
.ad-label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted2);margin-bottom:0.4rem;text-align:right;}
.ad-frame{
  width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;
  border:0.5px solid var(--border);position:relative;cursor:pointer;
  background:var(--bg2);
}
.ad-slide{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.6s ease;
}
.ad-slide.active{opacity:1;}
.ad-slide-inner{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0.5rem;padding:1.5rem;
  text-align:center;
}
.ad-badge{
  font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;
  padding:0.2rem 0.6rem;border-radius:20px;font-family:sans-serif;
  background:rgba(201,168,76,0.15);color:var(--gold);border:0.5px solid var(--border2);
}
.ad-title{font-size:1.1rem;font-weight:700;color:var(--text);}
.ad-sub{font-size:0.78rem;color:var(--muted);}
.ad-dots{display:flex;gap:5px;justify-content:center;margin-top:0.5rem;}
.ad-dot{width:6px;height:6px;border-radius:50%;background:var(--muted2);transition:all 0.3s;}
.ad-dot.active{background:var(--gold);width:16px;border-radius:3px;}
.ad-progress{
  position:absolute;bottom:0;left:0;height:2px;background:var(--gold);
  transition:none;
}

/* ─── SECTION HEADER ─── */
.section-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 0.75rem 0.5rem;
}
.section-hdr h2{font-size:0.9rem;letter-spacing:0.05em;color:var(--text);}
.see-all{font-size:0.75rem;color:var(--gold);cursor:pointer;border:none;background:none;font-family:inherit;}

/* ─── SHORTS GRID ─── */
.shorts-scroll{display:flex;gap:0.6rem;overflow-x:auto;padding:0 0.75rem 0.5rem;scrollbar-width:none;}
.shorts-scroll::-webkit-scrollbar{display:none;}
.short-card{
  flex-shrink:0;width:110px;height:185px;border-radius:12px;
  background:var(--bg2);border:0.5px solid var(--border);
  overflow:hidden;position:relative;cursor:pointer;
  transition:transform 0.18s;
}
.short-card:hover{transform:scale(1.03);}
.short-thumb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem;}
.short-overlay{
  position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.75) 0%,transparent 50%);
  display:flex;flex-direction:column;justify-content:flex-end;padding:0.5rem;
}
.short-views{font-size:0.65rem;color:rgba(255,255,255,0.8);font-family:sans-serif;}
.short-nick{font-size:0.68rem;color:var(--gold-l);}
.short-play{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:32px;height:32px;border-radius:50%;background:rgba(201,168,76,0.8);
  display:flex;align-items:center;justify-content:center;font-size:0.9rem;
}

/* ─── CHANNELS ROW ─── */
.channels-scroll{display:flex;gap:0.75rem;overflow-x:auto;padding:0 0.75rem 0.5rem;scrollbar-width:none;}
.channels-scroll::-webkit-scrollbar{display:none;}
.channel-card{
  flex-shrink:0;width:130px;background:var(--bg2);border:0.5px solid var(--border);
  border-radius:14px;padding:0.9rem 0.75rem;text-align:center;cursor:pointer;
  transition:border-color 0.2s;
}
.channel-card:hover{border-color:var(--border2);}
.ch-avatar{
  width:50px;height:50px;border-radius:50%;background:var(--bg3);
  margin:0 auto 0.5rem;display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;border:1.5px solid var(--border);position:relative;
}
.ch-crown{
  position:absolute;top:-6px;right:-4px;font-size:0.8rem;
  filter:drop-shadow(0 0 4px rgba(201,168,76,0.8));
}
.ch-name{font-size:0.8rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-followers{font-size:0.65rem;color:var(--muted);margin-top:0.15rem;}
.follow-btn{
  margin-top:0.5rem;width:100%;padding:0.3rem;
  background:rgba(201,168,76,0.1);border:0.5px solid var(--border);
  border-radius:6px;color:var(--gold);font-size:0.7rem;cursor:pointer;
  font-family:inherit;transition:all 0.2s;
}
.follow-btn:hover,.follow-btn.following{background:var(--gold-d);border-color:var(--gold);color:#1a1208;}

/* ─── FEED POSTS ─── */
.feed-posts{padding:0 0.75rem;}
.post{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;margin-bottom:0.75rem;overflow:hidden;}
.post-header{display:flex;align-items:center;gap:0.6rem;padding:0.75rem;}
.post-avatar{width:38px;height:38px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.1rem;border:1px solid var(--border);flex-shrink:0;}
.post-meta{flex:1;}
.post-nick{font-size:0.85rem;font-weight:700;color:var(--text);}
.post-time{font-size:0.65rem;color:var(--muted);}
.post-thumb{width:100%;aspect-ratio:16/9;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:3rem;cursor:pointer;position:relative;}
.post-play-icon{position:absolute;width:50px;height:50px;border-radius:50%;background:rgba(201,168,76,0.85);display:flex;align-items:center;justify-content:center;font-size:1.3rem;}
.post-actions{display:flex;align-items:center;gap:1rem;padding:0.75rem;border-top:0.5px solid var(--border);}
.action-btn{display:flex;align-items:center;gap:0.3rem;font-size:0.78rem;color:var(--muted);cursor:pointer;border:none;background:none;font-family:inherit;transition:color 0.2s;}
.action-btn:hover{color:var(--gold);}
.action-btn.liked{color:var(--red);}
.action-btn span{font-size:1rem;}

/* ─── BOTTOM NAV ─── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(10,10,15,0.95);backdrop-filter:blur(12px);
  border-top:0.5px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;
  padding:0.6rem 0 max(0.6rem,env(safe-area-inset-bottom));
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:0.2rem;
  cursor:pointer;padding:0.3rem 0.75rem;border-radius:10px;
  transition:all 0.2s;flex:1;
}
.nav-item:hover,.nav-item.active{background:rgba(201,168,76,0.08);}
.nav-icon{font-size:1.25rem;}
.nav-label{font-size:0.58rem;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);}
.nav-item.active .nav-label{color:var(--gold);}

/* ─── BROADCAST BANNER ─── */
.broadcast{
  margin:0 0.75rem 0.75rem;
  background:rgba(201,168,76,0.08);
  border:0.5px solid var(--border2);
  border-radius:10px;padding:0.65rem 1rem;
  display:flex;align-items:flex-start;gap:0.6rem;
  animation:slideIn 0.4s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.broadcast-icon{font-size:1rem;flex-shrink:0;}
.broadcast-text{font-size:0.8rem;color:var(--gold-l);line-height:1.4;flex:1;}
.broadcast-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.9rem;flex-shrink:0;}
</style>
</head>
<body>

<!-- TOP NAV -->
<div class="topnav">

<!-- STATUS VIEWER OVERLAY -->
<div class="status-viewer" id="sv">
  <div class="sv-header">
    <div class="sv-bars" id="sv-bars"></div>
    <div class="sv-top">
      <div class="sv-user">
        <div class="sv-avatar" id="sv-avatar">😊</div>
        <div class="sv-info">
          <div class="sv-nick" id="sv-nick">User</div>
          <div class="sv-time" id="sv-time">2 min ago</div>
        </div>
      </div>
      <div class="sv-actions">
        <button class="sv-mute" id="sv-mute-btn" onclick="toggleMute()">🔊</button>
        <button class="sv-close" onclick="closeStatus()">✕</button>
      </div>
    </div>
  </div>
  <div class="sv-content">
    <div class="sv-tap-left" onclick="prevSlide()"></div>
    <div class="sv-tap-right" onclick="nextSlide()"></div>
    <div class="sv-slide" id="sv-slide"></div>
  </div>
  <button class="views-btn" id="sv-views-btn" onclick="showViewers()">👁 24 viewers</button>
  <div class="sv-footer">
    <input class="sv-reply" placeholder="Reply..." id="sv-reply-input">
    <div class="sv-heart-btn" onclick="likeStatus()">🤍</div>
  </div>
</div>

<script>
/* ─── DATA ─── */
const OWNER_EMAIL = "avrumy5872877@gmail.com";

let STATUSES = [];

async function loadLiveStatuses() {
    try {
        if (!window.sb) {
            console.error("Supabase client is not loaded yet.");
            return;
        }
        
        // 🌍 ציען די לעבעדיגע סטאַטוסעס פֿון דעם נייעם 'statuses' טייבל
        const { data, error } = await window.sb
            .from('statuses')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) throw error;

        if (data && data.length > 0) {
            STATUSES = data;
            if (typeof renderStatuses === 'function') renderStatuses();
        }
    } catch (err) {
        console.error('Error loading live statuses:', err.message);
    }
}

// לאָדן די דאַטן אויטאָמאַטיש ווען דער בלאַט עפֿנט זיך
document.addEventListener("DOMContentLoaded", function() {
    setTimeout(loadLiveStatuses, 500);
});

];

const SHORTS = [

const CHANNELS = [

const POSTS = [
  {emoji:"🎹",nick:"MosheMusic",time:"10 min ago",content:"🎬",caption:"Just dropped a new clip! Check it out 🔥",likes:142,comments:23},
  {emoji:"📖",nick:"RebbeVibes",time:"1 hour ago",content:"🎬",caption:"Weekly Torah class recording is up!",likes:87,comments:11},
  {emoji:"🎤",nick:"ShlomoBeats",time:"3 hours ago",content:"🎬",caption:"Studio behind the scenes 👀🎧",likes:204,comments:38},

/* ─── BUILD STATUS ROW ─── */
const row = document.getElementById('status-row');
STATUSES.forEach((s,i)=>{
  const item = document.createElement('div');
  item.className = 'status-item';
  item.onclick = ()=>openStatus(i);
  item.innerHTML = `
    <div class="status-ring${s.viewed?' viewed':''}">
      <div class="status-inner">${s.emoji}</div>
    </div>
    <div class="status-name">${s.nick}</div>`;
  row.appendChild(item);
});

/* ─── BUILD ADS ─── */
let adIdx=0, adTimer=null, adAnimFrame=null;
const adFrame=document.getElementById('ad-frame');
const adDots=document.getElementById('ad-dots');
const adProgress=document.getElementById('ad-progress');

ADS.forEach((ad,i)=>{
  const slide=document.createElement('div');
  slide.className='ad-slide'+(i===0?' active':'');
  slide.style.background=ad.bg;
  slide.innerHTML=`
    <div class="ad-slide-inner">
      <div style="font-size:2.5rem">${ad.icon}</div>
      <div class="ad-badge">Sponsored</div>
      <div class="ad-title">${ad.title}</div>
      <div class="ad-sub">${ad.sub}</div>
    </div>`;
  adFrame.insertBefore(slide, adProgress);
  const dot=document.createElement('div');
  dot.className='ad-dot'+(i===0?' active':'');
  adDots.appendChild(dot);
});

function adClick(){window.open(ADS[adIdx].url,'_blank');}
function setAd(idx){
  document.querySelectorAll('.ad-slide').forEach((s,i)=>s.classList.toggle('active',i===idx));
  document.querySelectorAll('.ad-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  adIdx=idx;
  startAdTimer();
}
function startAdTimer(){
  clearInterval(adTimer);
  const dur=ADS[adIdx].duration*1000;
  const start=Date.now();
  adProgress.style.transition='none';
  adProgress.style.width='0%';
  cancelAnimationFrame(adAnimFrame);
  function step(){
    const pct=Math.min(100,(Date.now()-start)/dur*100);
    adProgress.style.width=pct+'%';
    if(pct<100) adAnimFrame=requestAnimationFrame(step);
    else{
      const next=(adIdx+1)%ADS.length;
      setAd(next);
    }
  }
  requestAnimationFrame(step);
}
startAdTimer();

/* ─── STATUS VIEWER ─── */
let svUser=null, svSlideIdx=0, svTimer=null, svMuted=false, svHeld=false;
const SLIDE_DUR=5000;

function openStatus(i){
  svUser=STATUSES[i]; svSlideIdx=0;
  STATUSES[i].viewed=true;
  document.querySelectorAll('.status-ring')[i+1]?.classList.add('viewed');
  document.getElementById('sv-avatar').textContent=svUser.emoji;
  document.getElementById('sv-nick').textContent=svUser.nick;
  document.getElementById('sv-time').textContent=svUser.time;
  document.getElementById('sv-views-btn').className='views-btn';
  buildBars();
  showSlide(0);
  document.getElementById('sv').classList.add('open');
}
  function openMyStatus() {
    document.getElementById('status-file-input').click();
                          }
function closeStatus(){
  document.getElementById('sv').classList.remove('open');
  clearTimeout(svTimer);
  document.querySelectorAll('.sv-bar-fill').forEach(b=>b.style.animation='none');
}
  async function handleUpload(e) {
    const file = e.target.files[0];
    if (!file) return;

    alert(`Uploading "${file.name}" to Supabase...`);
    const fileName = `status_${Date.now()}_${file.name}`;

    try {
        // 1. ארויפלאדן דעם פייל צו Supabase Storage
        const { data, error } = await window.sb.storage
            .from('statuses')
            .upload(fileName, file);

        if (error) throw error;

        // 2. באקומען דעם פובליק לינק
        const { data: urlData } = window.sb.storage.from('statuses').getPublicUrl(fileName);
        
        // 3. אריינשרייבן דעם סטאתוס אין דאטאבעיס
        const { error: dbError } = await window.sb.from('statuses').insert([{
            nick: "Me", 
            emoji: "👑",
            slides: JSON.stringify([{ type: "image", bg: "#1a0a2e", text: "", url: urlData.publicUrl }]),
            created_at: new Date()
        }]);

        if (dbError) throw dbError;

        alert("✅ סטאַטוס ארויפגעלאדנט!");
        
        // ריפרעשן די ליסטע
        if (typeof loadLiveStatuses === 'function') loadLiveStatuses();

    } catch (err) {
        alert("❌ Error: " + err.message);
    }
  }
function buildBars(){
  const cont=document.getElementById('sv-bars');
  cont.innerHTML='';
  svUser.slides.forEach((_,i)=>{
    cont.innerHTML+=`<div class="sv-bar"><div class="sv-bar-fill" id="bar${i}"></div></div>`;
  });
}
function showSlide(idx){
  clearTimeout(svTimer);
  const slide=svUser.slides[idx];
  const el=document.getElementById('sv-slide');
  el.style.opacity='0';
  el.style.background=slide.bg||'#111';
  el.style.color=slide.color||'#fff';
  el.style.fontSize='1.3rem';
  el.style.lineHeight='1.6';
  setTimeout(()=>{
    el.textContent=slide.text||'';
    el.style.opacity='1';
  },100);
  document.querySelectorAll('.sv-bar-fill').forEach((b,i)=>{
    b.style.animation='none';
    b.className='sv-bar-fill'+(i<idx?' done':'');
  });
  const bar=document.getElementById('bar'+idx);
  if(bar){
    bar.className='sv-bar-fill active';
    bar.style.animation=`barfill ${SLIDE_DUR}ms linear forwards`;
  }
  svTimer=setTimeout(nextSlide, SLIDE_DUR);
}
function nextSlide(){
  if(svSlideIdx<svUser.slides.length-1){svSlideIdx++;showSlide(svSlideIdx);}
  else closeStatus();
}
function prevSlide(){
  if(svSlideIdx>0){svSlideIdx--;showSlide(svSlideIdx);}
}
function toggleMute(){
  svMuted=!svMuted;
  document.getElementById('sv-mute-btn').textContent=svMuted?'🔇':'🔊';
}
function likeStatus(){
  const h=document.querySelector('.sv-heart-btn');
  h.textContent='❤️';
  setTimeout(()=>h.textContent='🤍',1000);
}
function showViewers(){alert('Viewers:\n• YidUser1\n• Moshe_Fan\n• ShlomoBeats\n• 21 others');}
  // 🚀 באָמבּע-פרוף נאַוויגאַציע לויט די ווערטער אויפ'ן סקרין!
setTimeout(function() {
    const items = document.querySelectorAll('.nav-item, .bottom-nav div, [onclick*="setNav"]');
    items.forEach(el => {
        el.removeAttribute('onclick'); // נעמען אראפ די אלטע חולאת'ן
        el.style.cursor = 'pointer';   
        
        const txt = el.textContent.trim().toLowerCase();
        
        // ער קוקט וואסערע ווארט שטייט אינעווייניג אינעם קנעפּל
        if (txt.includes('home')) {

        } else if (txt.includes('chat')) {
            el.onclick = () => window.location.href = "yidplus-chat.html";

}, 300);
