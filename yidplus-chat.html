<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0A0A0F">
<title>💬 YID PLUS — Chats</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--gold:#C9A84C;--gold-l:#F0D080;--gold-d:#8B6914;--bg:#0A0A0F;--bg2:#13131A;--bg3:#1C1C26;--bg4:#222230;--border:rgba(201,168,76,.18);--border2:rgba(201,168,76,.45);--text:#F0EDE6;--muted:#8A8070;--muted2:#5A5448;--red:#E24B4A;--green:#1D9E75;--blue:#378ADD;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:Georgia,serif;color:var(--text);-webkit-font-smoothing:antialiased;}
body.night{--bg:#050508;--bg2:#0A0A10;--bg3:#111118;}

/* SCREENS */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);transform:translateX(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);pointer-events:none;overflow:hidden;}
.screen.active{transform:translateX(0);pointer-events:all;}
.screen.prev{transform:translateX(-30%);}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;}
.scroll-area::-webkit-scrollbar{display:none;}

/* TOPBAR */
.topbar{background:rgba(10,10,15,.97);border-bottom:.5px solid var(--border);padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;backdrop-filter:blur(12px);}
.topbar-logo{font-size:1.1rem;font-weight:700;letter-spacing:.1em;background:linear-gradient(135deg,var(--gold-l),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.icon-btn{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;transition:all .2s;position:relative;flex-shrink:0;}
.icon-btn:active{transform:scale(.88);}

/* BOTTOM NAV */
.bottom-nav{background:rgba(10,10,15,.97);backdrop-filter:blur(12px);border-top:.5px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:.6rem 0 max(.6rem,env(safe-area-inset-bottom));flex-shrink:0;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:.2rem;cursor:pointer;padding:.3rem .75rem;flex:1;border:none;background:none;font-family:inherit;}
.nav-icon{font-size:1.2rem;}
.nav-label{font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.nav-item.active .nav-label{color:var(--gold);}

/* TOAST */
#app-toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);background:rgba(19,19,26,.97);border:.5px solid var(--border2);border-radius:10px;padding:.6rem 1.25rem;font-size:.8rem;color:var(--gold-l);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
#app-toast.show{opacity:1;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.75);display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--bg2);border:.5px solid var(--border);border-radius:20px 20px 0 0;padding:1.5rem 1.5rem max(1.5rem,env(safe-area-inset-bottom));width:100%;max-width:500px;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:.95rem;font-weight:700;margin-bottom:1.25rem;text-align:center;}
.modal-cancel{width:100%;padding:.65rem;background:transparent;border:.5px solid rgba(255,255,255,.08);border-radius:10px;color:var(--muted);font-size:.82rem;cursor:pointer;font-family:inherit;margin-top:.5rem;}
.field{width:100%;padding:.72rem 1rem;background:var(--bg3);border:.5px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;font-family:inherit;outline:none;transition:border .2s;margin-bottom:.85rem;display:block;}
.field:focus{border-color:var(--border2);}
.field::placeholder{color:var(--muted);}
.btn-primary{width:100%;padding:.82rem;background:linear-gradient(135deg,var(--gold-d),var(--gold));color:#1a1208;font-size:.88rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:10px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:.5rem;min-height:46px;}
.btn-primary:active{transform:scale(.97);}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}

/* CHAT LIST */
.chat-search-wrap{padding:.6rem 1rem;background:var(--bg);flex-shrink:0;position:relative;}
.chat-search-icon{position:absolute;left:1.75rem;top:50%;transform:translateY(-50%);font-size:.85rem;color:var(--muted);pointer-events:none;}
.chat-search-input{width:100%;padding:.55rem 1rem .55rem 2.4rem;background:var(--bg3);border:.5px solid var(--border);border-radius:20px;color:var(--text);font-size:.85rem;font-family:inherit;outline:none;}
.chat-tabs-row{display:flex;border-bottom:.5px solid var(--border);flex-shrink:0;}
.ctab{flex:1;padding:.65rem;text-align:center;font-size:.78rem;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;transition:all .2s;}
.ctab.active{color:var(--gold);border-bottom-color:var(--gold);}
.chat-item{display:flex;align-items:center;gap:.75rem;padding:.85rem 1rem;border-bottom:.5px solid rgba(201,168,76,.06);cursor:pointer;transition:background .15s;}
.chat-item:active{background:rgba(201,168,76,.04);}
.chat-item.unread{background:rgba(201,168,76,.03);}
.chat-av{width:48px;height:48px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;position:relative;border:1px solid var(--border);}
.chat-av.group{border-radius:14px;}
.online-dot{position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:var(--green);border:2px solid var(--bg);}
.unread-badge{min-width:18px;height:18px;border-radius:9px;background:var(--gold);color:#1a1208;font-size:.62rem;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0;}

/* CHAT ROOM */
.room-topbar{background:rgba(10,10,15,.97);border-bottom:.5px solid var(--border);padding:.6rem 1rem;display:flex;align-items:center;gap:.6rem;flex-shrink:0;}
.room-av{width:38px;height:38px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.2rem;border:1px solid var(--border);flex-shrink:0;}
.room-av.group{border-radius:10px;}
.join-banner{background:rgba(201,168,76,.07);border-top:.5px solid var(--border);padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.join-group-btn{padding:.4rem 1rem;background:var(--gold-d);border:none;border-radius:8px;color:#1a1208;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;}
.reply-preview{background:rgba(201,168,76,.07);border-left:2px solid var(--gold);padding:.4rem .75rem;display:flex;align-items:center;justify-content:space-between;font-size:.75rem;color:var(--muted);flex-shrink:0;}
.reply-preview button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:.1rem .3rem;}
.chat-msgs{flex:1;overflow-y:auto;padding:.75rem;background:var(--bg);scrollbar-width:none;}
.chat-msgs::-webkit-scrollbar{display:none;}
.date-sep{text-align:center;margin:.75rem 0;}
.date-sep span{background:rgba(201,168,76,.1);border:.5px solid var(--border);border-radius:10px;padding:.2rem .75rem;font-size:.65rem;color:var(--muted);}
.msg-wrap{display:flex;margin-bottom:.4rem;align-items:flex-end;gap:.4rem;}
.msg-wrap.me{flex-direction:row-reverse;}
.msg-mini-av{width:24px;height:24px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;border:1px solid var(--border);}
.bubble{max-width:72%;padding:.55rem .85rem;border-radius:16px;font-size:.85rem;line-height:1.5;word-break:break-word;}
.bubble.me{background:#1a2a1a;border:.5px solid rgba(29,158,117,.25);border-bottom-right-radius:4px;}
.bubble.them{background:var(--bg3);border:.5px solid var(--border);border-bottom-left-radius:4px;}
.bubble.sticker{background:transparent!important;border:none!important;font-size:3.5rem;padding:.25rem!important;}
.bubble-nick{font-size:.65rem;color:var(--gold-l);margin-bottom:.25rem;font-weight:700;}
.reply-quote{background:rgba(201,168,76,.08);border-left:2px solid var(--gold);border-radius:6px;padding:.3rem .5rem;margin-bottom:.4rem;font-size:.72rem;color:var(--muted);}
.reply-quote strong{color:var(--gold-l);display:block;font-size:.68rem;margin-bottom:.1rem;}
.bubble-meta{display:flex;align-items:center;justify-content:flex-end;gap:.3rem;margin-top:.2rem;}
.bubble-time{font-size:.6rem;color:var(--muted2);}
.read-ticks{font-size:.65rem;color:var(--blue);}
.voice-msg{display:flex;align-items:center;gap:.6rem;min-width:160px;}
.play-voice{width:30px;height:30px;border-radius:50%;background:var(--gold-d);display:flex;align-items:center;justify-content:center;font-size:.8rem;cursor:pointer;border:none;color:#1a1208;}
.voice-bars{display:flex;align-items:center;gap:2px;flex:1;}
.vbar{background:var(--gold);border-radius:2px;}
.voice-dur{font-size:.68rem;color:var(--muted);flex-shrink:0;}
.typing-bar{display:flex;align-items:center;gap:.4rem;padding:.4rem .75rem;flex-shrink:0;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:tdot 1.2s infinite;display:inline-block;margin:0 1px;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.sticker-tray{background:var(--bg2);border-top:.5px solid var(--border);padding:.75rem;display:none;flex-wrap:wrap;gap:.4rem;max-height:140px;overflow-y:auto;flex-shrink:0;}
.sticker-tray.open{display:flex;}
.chat-input-bar{background:rgba(10,10,15,.97);border-top:.5px solid var(--border);padding:.6rem .75rem max(.6rem,env(safe-area-inset-bottom));display:flex;align-items:flex-end;gap:.5rem;flex-shrink:0;}
.chat-input-bar.locked{opacity:.4;pointer-events:none;}
.chat-textarea{flex:1;padding:.6rem .85rem;background:var(--bg3);border:.5px solid var(--border);border-radius:20px;color:var(--text);font-size:.88rem;font-family:inherit;outline:none;resize:none;max-height:100px;line-height:1.4;}
.chat-textarea:focus{border-color:var(--border2);}
.chat-send{width:38px;height:38px;border-radius:50%;background:var(--gold-d);border:none;color:#1a1208;font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.voice-btn{width:38px;height:38px;border-radius:50%;background:rgba(226,74,74,.15);border:.5px solid rgba(226,74,74,.4);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;flex-shrink:0;}
.voice-btn.rec{background:rgba(226,74,74,.4);animation:pulse .8s infinite;}
.attach-wrap{position:relative;flex-shrink:0;}
.attach-sheet{position:absolute;bottom:100%;left:0;background:var(--bg2);border:.5px solid var(--border);border-radius:16px;padding:1rem;display:none;grid-template-columns:repeat(4,1fr);gap:.75rem;min-width:240px;z-index:10;margin-bottom:.25rem;}
.attach-sheet.open{display:grid;}
.attach-opt{display:flex;flex-direction:column;align-items:center;gap:.35rem;cursor:pointer;}
.attach-icon{width:48px;height:48px;border-radius:14px;background:var(--bg3);border:.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
.attach-lbl{font-size:.65rem;color:var(--muted);}
.ctx-menu{position:fixed;z-index:200;background:var(--bg2);border:.5px solid var(--border2);border-radius:12px;padding:.4rem 0;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,.5);display:none;}
.ctx-menu.open{display:block;}
.ctx-item{padding:.6rem 1rem;font-size:.82rem;cursor:pointer;display:flex;align-items:center;gap:.6rem;}
.ctx-item:hover{background:rgba(201,168,76,.06);}
.ctx-item.danger{color:var(--red);}
</style>
</head>
<body>

<!-- ══ CHAT LIST ══ -->
<div class="screen active" id="screen-chats">
  <div class="topbar">
    <div class="topbar-logo">👑 Chats</div>
    <div style="display:flex;gap:.5rem">
      <div class="icon-btn" onclick="toast('New group')">👥</div>
      <div class="icon-btn" onclick="toast('New chat')">✏️</div>
    </div>
  </div>
  <div class="chat-search-wrap">
    <span class="chat-search-icon">🔍</span>
    <input class="chat-search-input" placeholder="Search chats, groups..." id="chat-search" oninput="filterChatList()">
  </div>
  <div class="chat-tabs-row">
    <button class="ctab active" onclick="switchChatTab(this,'all')">All</button>
    <button class="ctab" onclick="switchChatTab(this,'private')">Private</button>
    <button class="ctab" onclick="switchChatTab(this,'groups')">Groups</button>
  </div>
  <div class="scroll-area" id="chat-list-area"></div>
  <nav class="bottom-nav">
    <button class="nav-item" onclick="goPage('yidplus-dashboard.html')"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></button>
    <button class="nav-item" onclick="goPage('yidplus-shorts.html')"><span class="nav-icon">🎬</span><span class="nav-label">Shorts</span></button>
    <button class="nav-item" onclick="goPage('yidplus-music.html')"><span class="nav-icon">🎵</span><span class="nav-label">Music</span></button>
    <button class="nav-item active"><span class="nav-icon">💬</span><span class="nav-label">Chats</span></button>
    <button class="nav-item" onclick="goPage('yidplus-admin.html')"><span class="nav-icon">⚙️</span><span class="nav-label">Admin</span></button>
  </nav>
</div>

<!-- ══ CHAT ROOM ══ -->
<div class="screen" id="screen-chatroom">
  <div class="room-topbar">
    <div class="icon-btn" onclick="navTo('chats')">‹</div>
    <div class="room-av" id="cr-av"></div>
    <div style="flex:1;min-width:0">
      <div style="font-size:.9rem;font-weight:700" id="cr-name"></div>
      <div style="font-size:.68rem" id="cr-status"></div>
    </div>
    <div style="display:flex;gap:.4rem">
      <div class="icon-btn" onclick="toast('Voice call')">📞</div>
      <div class="icon-btn" onclick="toast('Video call')">📹</div>
    </div>
  </div>
  <div id="join-banner" style="display:none" class="join-banner">
    <span style="font-size:.8rem;color:var(--muted)">Join this group to send messages</span>
    <button class="join-group-btn" onclick="joinCurrentGroup()">Join Group</button>
  </div>
  <div id="reply-preview" style="display:none" class="reply-preview">
    <div><strong id="reply-nick-lbl" style="color:var(--gold-l)"></strong> <span id="reply-snip"></span></div>
    <button onclick="cancelReply()">✕</button>
  </div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div id="typing-bar" style="display:none" class="typing-bar">
    <div class="typing-dots"><span></span><span></span><span></span></div>
    <div style="font-size:.72rem;color:var(--muted)" id="typing-lbl"></div>
  </div>
  <div class="sticker-tray" id="sticker-tray"></div>
  <div class="chat-input-bar" id="chat-input-bar">
    <div class="attach-wrap">
      <div class="icon-btn" onclick="toggleAttach()">📎</div>
      <div class="attach-sheet" id="attach-sheet">
        <div class="attach-opt" onclick="triggerFile('image/*')"><div class="attach-icon">🖼️</div><div class="attach-lbl">Photo</div></div>
        <div class="attach-opt" onclick="triggerFile('video/*')"><div class="attach-icon">🎬</div><div class="attach-lbl">Video</div></div>
        <div class="attach-opt" onclick="recordVoice()"><div class="attach-icon">🎤</div><div class="attach-lbl">Voice</div></div>
        <div class="attach-opt" onclick="triggerFile('*/*')"><div class="attach-icon">📁</div><div class="attach-lbl">File</div></div>
      </div>
      <input type="file" id="chat-file-input" style="display:none" onchange="handleFileAttach(event)">
    </div>
    <textarea class="chat-textarea" id="chat-input" placeholder="Message..." rows="1"
      oninput="onChatType()" onkeydown="onChatKey(event)"></textarea>
    <div class="icon-btn" onclick="toggleStickers()">😊</div>
    <div class="voice-btn" id="voice-btn" onclick="toggleVoiceRec()">🎙️</div>
    <div class="chat-send" id="chat-send-btn" onclick="sendMsg()" style="display:none">➤</div>
  </div>
</div>

<!-- ══ CONTEXT MENU ══ -->
<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-item" onclick="ctxAction('reply')">↩️ Reply</div>
  <div class="ctx-item" onclick="ctxAction('copy')">📋 Copy</div>
  <div class="ctx-item" onclick="ctxAction('forward')">📤 Forward</div>
  <div class="ctx-item danger" onclick="ctxAction('delete')">🗑️ Delete</div>
  <div class="ctx-item" onclick="closeCtx()">✕ Cancel</div>
</div>

<!-- ══ NEW CHAT MODAL ══ -->
<div class="modal-overlay" id="new-chat-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal-sheet">
    <div class="modal-title">✏️ New Chat</div>
    <input class="field" id="new-chat-search" placeholder="Search by nickname..." oninput="searchUsers()">
    <div id="user-search-results" style="max-height:200px;overflow-y:auto"></div>
    <button class="modal-cancel" onclick="document.getElementById('new-chat-modal').classList.remove('open')">Cancel</button>
  </div>
</div>

  {id:'d5',type:'group',nick:'NYC Kosher Foodies 🥘',emoji:'🥘',online:false,time:'3h',unread:5,preview:'KosherChef: Cholent recipe posted!',joined:true,members:'512 members',
   history:[
     {id:'m12',from:'KosherChef',emoji:'👨‍🍳',text:'Who wants the cholent recipe? 🥘',time:'8:00',read:true},
     {id:'m13',from:'KosherChef',emoji:'👨‍🍳',text:'Cholent recipe posted!',time:'8:10',read:false}
   ]},
];

// Local message histories (mutable)
var LOCAL_HISTORIES = {};
DEMO_CHATS.forEach(function(c){
  LOCAL_HISTORIES[c.id] = c.history.map(function(m){return Object.assign({},m);});
});

// ── CHAT LIST ──
function buildChatList(){
  var el=document.getElementById('chat-list-area');if(!el)return;
  el.innerHTML='';
  var filtered=DEMO_CHATS.filter(function(c){
    var tabOk=CHAT_tab==='all'||(CHAT_tab==='private'&&c.type==='private')||(CHAT_tab==='groups'&&c.type==='group');
    var srchOk=!CHAT_search||c.nick.toLowerCase().includes(CHAT_search.toLowerCase());
    return tabOk&&srchOk;
  });
  if(!filtered.length){
    el.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1rem;gap:.75rem;color:var(--muted);text-align:center"><div style="font-size:2.5rem">💬</div><div style="font-size:.9rem">No chats found</div></div>';
    return;
  }
  filtered.forEach(function(chat){
    var item=document.createElement('div');
    item.className='chat-item'+(chat.unread?' unread':'');
    item.onclick=function(){openRoom(chat.id);};
    item.innerHTML=
      '<div class="chat-av'+(chat.type==='group'?' group':'')+'">'+chat.emoji+
        (chat.online?'<div class="online-dot"></div>':'')+
      '</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="display:flex;align-items:center;justify-content:space-between">'+
          '<div style="font-size:.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px">'+escHtml(chat.nick)+'</div>'+
          '<div style="font-size:.65rem;color:var(--muted);flex-shrink:0">'+chat.time+'</div>'+
        '</div>'+
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:.2rem">'+
          '<div style="font-size:.78rem;color:'+(chat.unread?'var(--text)':'var(--muted)')+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px">'+escHtml(chat.preview)+'</div>'+
          (chat.unread?'<div class="unread-badge">'+chat.unread+'</div>':'')+
        '</div>'+
        (!chat.joined&&chat.type==='group'?'<div style="font-size:.65rem;color:var(--gold);border:.5px solid var(--border);border-radius:6px;padding:.15rem .5rem;margin-top:.3rem;display:inline-block">Tap to Join</div>':'')+
      '</div>';
    el.appendChild(item);
  });
}

function filterChatList(){
  CHAT_search=document.getElementById('chat-search').value||'';
  buildChatList();
}

function switchChatTab(btn,tab){
  CHAT_tab=tab;
  document.querySelectorAll('.ctab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  buildChatList();
}

// ── OPEN ROOM ──
function openRoom(id){
  CHAT_curId=id;
  var chat=DEMO_CHATS.find(function(c){return c.id===id;});
  if(!chat)return;
  chat.unread=0;
  buildChatList();

  // Set header
  var av=document.getElementById('cr-av');
  av.textContent=chat.emoji;
  av.className='room-av'+(chat.type==='group'?' group':'');

  document.getElementById('cr-name').textContent=chat.nick+(chat.members?' ('+chat.members+')':'');
  var st=document.getElementById('cr-status');
  if(chat.online){st.textContent='● Online';st.style.color='var(--green)';}
  else if(chat.type==='group'){st.textContent='👥 '+(chat.members||'');st.style.color='var(--muted)';}
  else{st.textContent='Last seen recently';st.style.color='var(--muted)';}

  // Join banner
  var jb=document.getElementById('join-banner');
  jb.style.display=(!chat.joined&&chat.type==='group')?'flex':'none';

  // Input lock
  var ib=document.getElementById('chat-input-bar');
  ib.className='chat-input-bar'+((!chat.joined&&chat.type==='group')?' locked':'');

  CHAT_replyTo=null;
  document.getElementById('reply-preview').style.display='none';
  document.getElementById('sticker-tray').classList.remove('open');

  renderMsgs();
  navTo('chatroom');

  // Typing simulation
  if(chat.online){
    setTimeout(function(){
      var tb=document.getElementById('typing-bar'),tl=document.getElementById('typing-lbl');
      if(tb&&tl){tb.style.display='flex';tl.textContent=chat.nick+' is typing...';}
      setTimeout(function(){if(tb)tb.style.display='none';},2500);
    },1500);
  }
}

// ── RENDER MESSAGES ──
function renderMsgs(){
  var cont=document.getElementById('chat-msgs');
  if(!cont||!CHAT_curId)return;
  var chat=DEMO_CHATS.find(function(c){return c.id===CHAT_curId;});
  var history=LOCAL_HISTORIES[CHAT_curId]||[];
  cont.innerHTML='';

  if(!history.length){
    cont.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:.75rem;color:var(--muted);text-align:center"><div style="font-size:2.5rem">💬</div><div style="font-size:.85rem">No messages yet<br>Say hello!</div></div>';
    return;
  }

  var lastDate='';
  history.forEach(function(msg,idx){
    var isMe=msg.from==='me';

    // Date separator
    if(msg.time&&msg.time.includes(':')){
      var today=new Date().toLocaleDateString();
      if(lastDate!==today){
        lastDate=today;
        var sep=document.createElement('div');sep.className='date-sep';
        sep.innerHTML='<span>Today</span>';
        cont.appendChild(sep);
      }
    }

    var wrap=document.createElement('div');
    wrap.className='msg-wrap'+(isMe?' me':'');
    wrap.dataset.idx=idx;

    // Group avatar
    if(!isMe&&chat&&chat.type==='group'){
      wrap.innerHTML='<div class="msg-mini-av">'+(msg.emoji||'😊')+'</div>';
    }

    // Bubble
    var bubble=document.createElement('div');

    if(msg.type==='sticker'){
      bubble.className='bubble sticker';
      bubble.textContent=msg.sticker||'😊';
    } else {
      bubble.className='bubble '+(isMe?'me':'them');
      var inner='';

      // Group nick
      if(!isMe&&chat&&chat.type==='group'){
        inner+='<div class="bubble-nick">@'+escHtml(msg.from||'')+'</div>';
      }

      // Reply quote
      if(msg.replyTo){
        inner+='<div class="reply-quote"><strong>'+escHtml(msg.replyTo.nick||'')+'</strong>'+escHtml((msg.replyTo.text||'').slice(0,60))+'</div>';
      }

      // Content
      if(msg.type==='voice'){
        var bars=Array.from({length:20},function(){
          return '<div class="vbar" style="width:3px;height:'+(4+Math.random()*14)+'px"></div>';
        }).join('');
        inner+='<div class="voice-msg"><button class="play-voice" onclick="this.textContent=this.textContent===\'▶\'?\'⏸\':\'▶\'">▶</button><div class="voice-bars">'+bars+'</div><div class="voice-dur">'+(msg.dur||'0:10')+'</div></div>';
      } else if(msg.type==='media'){
        inner+='<div style="width:180px;height:130px;border-radius:10px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:3rem;cursor:pointer" onclick="toast(\'Opening media...\')">'+escHtml(msg.mediaEmoji||'🖼️')+'</div>';
      } else {
        inner+='<span>'+escHtml(msg.text||'')+'</span>';
      }

      // Meta
      var ticks=isMe?'<span class="read-ticks">'+(msg.read?'✓✓':'✓')+'</span>':'';
      inner+='<div class="bubble-meta"><span class="bubble-time">'+(msg.time&&msg.time.includes(':')?msg.time:'')+'</span>'+ticks+'</div>';
      bubble.innerHTML=inner;
    }

    // Long press for context menu
    var lpt;
    bubble.addEventListener('touchstart',function(e){
      lpt=setTimeout(function(){showCtxMenu(e.touches[0].clientX,e.touches[0].clientY,msg,idx);},500);
    },{passive:true});
    bubble.addEventListener('touchend',function(){clearTimeout(lpt);});
    bubble.addEventListener('contextmenu',function(e){e.preventDefault();showCtxMenu(e.clientX,e.clientY,msg,idx);});
    bubble.addEventListener('dblclick',function(){
      if(msg.type!=='sticker'){setReply(msg);}
    });

    wrap.appendChild(bubble);
    cont.appendChild(wrap);
  });

  cont.scrollTop=cont.scrollHeight;
}

// ── SEND MESSAGE ──
function sendMsg(){
  var inp=document.getElementById('chat-input');
  var txt=(inp.value||'').trim();
  if(!txt)return;
  var chat=DEMO_CHATS.find(function(c){return c.id===CHAT_curId;});
  if(!chat||(!chat.joined&&chat.type==='group'))return;

  var msg={
    id:'local_'+Date.now(),
    from:'me',
    text:txt,
    time:nowTime(),
    read:false,
    replyTo:CHAT_replyTo?{nick:CHAT_replyTo.from==='me'?'You':chat.nick,text:(CHAT_replyTo.text||'').slice(0,60)}:null
  };

  LOCAL_HISTORIES[CHAT_curId].push(msg);
  chat.preview=txt;
  inp.value='';
  inp.style.height='auto';
  CHAT_replyTo=null;
  document.getElementById('reply-preview').style.display='none';
  document.getElementById('sticker-tray').classList.remove('open');
  toggleSendVoice();
  renderMsgs();
  buildChatList();

  // Auto-reply simulation
  if(chat.online){
    setTimeout(function(){
      var tb=document.getElementById('typing-bar'),tl=document.getElementById('typing-lbl');
      if(tb&&tl){tb.style.display='flex';tl.textContent=chat.nick+' is typing...';}
      setTimeout(function(){
        if(tb)tb.style.display='none';
        var replies=['Cool! 👍','Definitely!','Haha 😂','❤️','OK great!','Sure thing!','🔥','Wow!'];
        var r={id:'auto_'+Date.now(),from:chat.type==='group'?'ShlomoBeats':'them',emoji:chat.emoji,text:replies[Math.floor(Math.random()*replies.length)],time:nowTime(),read:false};
        LOCAL_HISTORIES[CHAT_curId].push(r);
        chat.preview=r.text;
        renderMsgs();
        buildChatList();
      },1000);
    },1200+Math.random()*800);
  }
}

function onChatType(){
  var inp=document.getElementById('chat-input');
  inp.style.height='auto';
  inp.style.height=Math.min(inp.scrollHeight,100)+'px';
  toggleSendVoice();
  document.getElementById('attach-sheet').classList.remove('open');
}

function onChatKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
}

function toggleSendVoice(){
  var has=(document.getElementById('chat-input').value||'').trim().length>0;
  document.getElementById('chat-send-btn').style.display=has?'flex':'none';
  document.getElementById('voice-btn').style.display=has?'none':'flex';
}

// ── VOICE RECORDING ──
function toggleVoiceRec(){
  CHAT_isRecording=!CHAT_isRecording;
  var btn=document.getElementById('voice-btn');
  btn.classList.toggle('rec',CHAT_isRecording);
  btn.textContent=CHAT_isRecording?'⏹️':'🎙️';
  if(!CHAT_isRecording){
    var dur='0:'+String(Math.floor(Math.random()*40+5)).padStart(2,'0');
    LOCAL_HISTORIES[CHAT_curId].push({id:'v'+Date.now(),from:'me',type:'voice',dur:dur,time:nowTime(),read:false});
    renderMsgs();
  }
}

function recordVoice(){
  document.getElementById('attach-sheet').classList.remove('open');
  toggleVoiceRec();
}

// ── ATTACHMENTS ──
function toggleAttach(){
  document.getElementById('attach-sheet').classList.toggle('open');
}
function triggerFile(accept){
  document.getElementById('chat-file-input').setAttribute('accept',accept);
  document.getElementById('chat-file-input').click();
  document.getElementById('attach-sheet').classList.remove('open');
}
function handleFileAttach(e){
  var f=e.target.files[0];if(!f)return;
  var icon={'image/':'🖼️','video/':'🎬','audio/':'🎵'}[''+f.type.split('/')[0]+'/']||'📄';
  LOCAL_HISTORIES[CHAT_curId].push({id:'f'+Date.now(),from:'me',type:'media',mediaEmoji:icon,time:nowTime(),read:false});
  renderMsgs();
  e.target.value='';
}

// ── STICKERS ──
var STICKERS=['😂','❤️','🔥','👑','🎹','✡️','🕎','🎉','🙏','😭','💯','🎶','👏','🤣','😍','🥰'];
function toggleStickers(){
  var tray=document.getElementById('sticker-tray');
  tray.classList.toggle('open');
  if(tray.classList.contains('open')&&!tray.children.length){
    STICKERS.forEach(function(s){
      var el=document.createElement('div');
      el.style.cssText='font-size:1.8rem;cursor:pointer;padding:.2rem;transition:transform .15s;';
      el.textContent=s;
      el.onclick=function(){
        LOCAL_HISTORIES[CHAT_curId].push({id:'s'+Date.now(),from:'me',type:'sticker',sticker:s,time:nowTime(),read:false});
        renderMsgs();
        tray.classList.remove('open');
      };
      el.addEventListener('touchstart',function(){el.style.transform='scale(1.3)';},{passive:true});
      el.addEventListener('touchend',function(){el.style.transform='scale(1)';});
      tray.appendChild(el);
    });
  }
}

// ── REPLY ──
function setReply(msg){
  CHAT_replyTo=msg;
  var chat=DEMO_CHATS.find(function(c){return c.id===CHAT_curId;})||{nick:''};
  var bar=document.getElementById('reply-preview');
  bar.style.display='flex';
  document.getElementById('reply-nick-lbl').textContent=msg.from==='me'?'You':chat.nick;
  document.getElementById('reply-snip').textContent=(msg.text||'[media]').slice(0,50)+'…';
  document.getElementById('chat-input').focus();
}
function cancelReply(){
  CHAT_replyTo=null;
  document.getElementById('reply-preview').style.display='none';
}

// ── JOIN GROUP ──
function joinCurrentGroup(){
  var chat=DEMO_CHATS.find(function(c){return c.id===CHAT_curId;});
  if(!chat)return;
  chat.joined=true;
  document.getElementById('join-banner').style.display='none';
  document.getElementById('chat-input-bar').className='chat-input-bar';
  toast('✅ Joined '+chat.nick+'!');
  renderMsgs();
}

// ── CONTEXT MENU ──
function showCtxMenu(x,y,msg,idx){
  CHAT_ctxTarget={msg:msg,idx:idx};
  var m=document.getElementById('ctx-menu');
  m.classList.add('open');
  m.style.left=Math.min(x,window.innerWidth-168)+'px';
  m.style.top=Math.min(y,window.innerHeight-170)+'px';
}
function closeCtx(){document.getElementById('ctx-menu').classList.remove('open');}
function ctxAction(action){
  if(!CHAT_ctxTarget)return;
  var msg=CHAT_ctxTarget.msg,idx=CHAT_ctxTarget.idx;
  if(action==='reply'){setReply(msg);}
  else if(action==='copy'){if(msg.text)navigator.clipboard&&navigator.clipboard.writeText(msg.text).then(function(){toast('📋 Copied!');}).catch(function(){toast('📋 Copied!');});else toast('📋 Nothing to copy.');}
  else if(action==='forward'){toast('📤 Forward: coming soon');}
  else if(action==='delete'){LOCAL_HISTORIES[CHAT_curId].splice(idx,1);renderMsgs();}
  closeCtx();
}

// ── OUTSIDE CLICK: close ctx + attach ──
document.addEventListener('click',function(e){
  var m=document.getElementById('ctx-menu');
  if(m&&!m.contains(e.target))m.classList.remove('open');
  var a=document.getElementById('attach-sheet');
  if(a&&!a.contains(e.target)&&!e.target.closest('.attach-wrap'))a.classList.remove('open');
});

// ── USER SEARCH (new chat) ──
function searchUsers(){
  var q=(document.getElementById('new-chat-search').value||'').trim();
  var el=document.getElementById('user-search-results');
  if(!q){el.innerHTML='';return;}
  sb.from(T.users).select('id,nickname,email').ilike('nickname','%'+q+'%').limit(10).then(function(r){
    el.innerHTML='';
    if(!r.data||!r.data.length){el.innerHTML='<div style="padding:1rem;text-align:center;font-size:.82rem;color:var(--muted)">No users found</div>';return;}
    r.data.forEach(function(u){
      var item=document.createElement('div');
      item.style.cssText='display:flex;align-items:center;gap:.6rem;padding:.65rem 1rem;border-bottom:.5px solid var(--border);cursor:pointer;';
      item.innerHTML='<div style="width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;border:.5px solid var(--border)">'+(u.nickname||'?').slice(0,2).toUpperCase()+'</div><div style="font-size:.85rem;font-weight:700">@'+escHtml(u.nickname||u.email||'')+'</div>';
      item.onclick=function(){document.getElementById('new-chat-modal').classList.remove('open');toast('Opening chat with @'+u.nickname);};
      el.appendChild(item);
    });
  });
}

// ── LOAD ──
document.addEventListener('DOMContentLoaded',function(){
  // Check auth
  sb.auth.getSession().then(function(r){
    if(r.data&&r.data.session){
      sb.from(T.users).select('*').eq('id',r.data.session.user.id).single().then(function(res){
        if(res.data)STATE.user=Object.assign({},res.data,{isOwner:res.data.email===OWNER_EMAIL});
      });
    }
  });
  buildChatList();
});
</script>
