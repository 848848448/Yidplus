<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#C9A84C;--gold-l:#F0D080;--gold-d:#8B6914;
  --bg:#0A0A0F;--bg2:#13131A;--bg3:#1C1C26;--bg4:#222230;
  --border:rgba(201,168,76,0.18);--border2:rgba(201,168,76,0.45);
  --text:#F0EDE6;--muted:#8A8070;--muted2:#5A5448;
  --red:#E24B4A;--green:#1D9E75;--blue:#378ADD;
  --bubble-me:#1a2a1a;--bubble-them:#1C1C26;
  --online:#1D9E75;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:Georgia,serif;color:var(--text);}

/* ─── SCREENS ─── */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform 0.32s cubic-bezier(0.32,0.72,0,1);}
.screen.hidden{transform:translateX(100%);}

/* ════════════════════════════
   SCREEN 1 — CHAT LIST
════════════════════════════ */
.list-topbar{
  background:rgba(10,10,15,0.95);border-bottom:0.5px solid var(--border);
  padding:0.75rem 1rem;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.list-logo{
  font-size:1.1rem;font-weight:700;letter-spacing:0.1em;
  background:linear-gradient(135deg,var(--gold-l),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.list-actions{display:flex;gap:0.5rem;}
.icon-btn{
  width:34px;height:34px;border-radius:50%;background:var(--bg3);
  border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:0.9rem;cursor:pointer;transition:all 0.2s;
}
.icon-btn:active{transform:scale(0.9);}

/* search */
.search-wrap{padding:0.6rem 1rem;background:var(--bg);flex-shrink:0;position:relative;}
.search-box{
  width:100%;padding:0.55rem 1rem 0.55rem 2.4rem;
  background:var(--bg3);border:0.5px solid var(--border);border-radius:20px;
  color:var(--text);font-size:0.85rem;font-family:inherit;outline:none;
  transition:border 0.2s;
}
.search-box:focus{border-color:var(--border2);}
.search-icon{position:absolute;left:1.75rem;top:50%;transform:translateY(-50%);font-size:0.85rem;pointer-events:none;color:var(--muted);}

/* tabs */
.chat-tabs{display:flex;gap:0;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.ctab{
  flex:1;padding:0.65rem;text-align:center;font-size:0.78rem;letter-spacing:0.05em;
  color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;
  background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;
}
.ctab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* chat list */
.chat-list{flex:1;overflow-y:auto;scrollbar-width:none;}
.chat-list::-webkit-scrollbar{display:none;}

.chat-item{
  display:flex;align-items:center;gap:0.75rem;padding:0.85rem 1rem;
  border-bottom:0.5px solid rgba(201,168,76,0.06);cursor:pointer;
  transition:background 0.15s;position:relative;
}
.chat-item:hover,.chat-item:active{background:rgba(201,168,76,0.04);}
.chat-item.unread{background:rgba(201,168,76,0.03);}

.chat-avatar{
  width:48px;height:48px;border-radius:50%;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;
  flex-shrink:0;position:relative;border:1px solid var(--border);
}
.chat-avatar.group{border-radius:14px;}
.online-dot{
  position:absolute;bottom:1px;right:1px;
  width:11px;height:11px;border-radius:50%;
  background:var(--online);border:2px solid var(--bg);
}
.chat-body{flex:1;min-width:0;}
.chat-row1{display:flex;align-items:center;justify-content:space-between;}
.chat-name{font-size:0.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;}
.chat-time{font-size:0.65rem;color:var(--muted);flex-shrink:0;}
.chat-row2{display:flex;align-items:center;justify-content:space-between;margin-top:0.2rem;}
.chat-preview{font-size:0.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.chat-preview.bold{color:var(--text);}
.unread-badge{
  min-width:18px;height:18px;border-radius:9px;background:var(--gold);
  color:#1a1208;font-size:0.62rem;font-weight:700;font-family:sans-serif;
  display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0;
}
.join-banner{
  background:rgba(201,168,76,0.08);border-top:0.5px solid var(--border);
  padding:0.5rem 1rem;text-align:center;font-size:0.75rem;color:var(--gold);
  cursor:pointer;margin-top:0.25rem;border-radius:4px;
}

/* bottom nav */
.bottom-nav{
  background:rgba(10,10,15,0.95);backdrop-filter:blur(12px);
  border-top:0.5px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;
  padding:0.6rem 0 max(0.6rem,env(safe-area-inset-bottom));
  flex-shrink:0;
}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:0.2rem;cursor:pointer;padding:0.3rem 0.75rem;flex:1;}
.nav-icon{font-size:1.2rem;}
.nav-label{font-size:0.58rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);}
.nav-item.active .nav-label{color:var(--gold);}

/* ════════════════════════════
   SCREEN 2 — CHAT ROOM
════════════════════════════ */
.chat-topbar{
  background:rgba(10,10,15,0.97);border-bottom:0.5px solid var(--border);
  padding:0.6rem 1rem;display:flex;align-items:center;gap:0.75rem;
  flex-shrink:0;position:relative;
}
.back-btn{font-size:1.4rem;cursor:pointer;color:var(--gold);padding:0.25rem 0.5rem;flex-shrink:0;}
.ct-avatar{
  width:38px;height:38px;border-radius:50%;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;
  border:1px solid var(--border);flex-shrink:0;position:relative;
}
.ct-avatar.group{border-radius:10px;}
.ct-online{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;background:var(--online);border:1.5px solid var(--bg);}
.ct-info{flex:1;min-width:0;}
.ct-name{font-size:0.9rem;font-weight:700;}
.ct-status{font-size:0.68rem;color:var(--green);}
.ct-actions{display:flex;gap:0.4rem;}

.chat-messages{
  flex:1;overflow-y:auto;padding:0.75rem;scrollbar-width:none;
  background:var(--bg);
  background-image:
    radial-gradient(circle at 20% 30%, rgba(201,168,76,0.03) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(201,168,76,0.02) 0%, transparent 50%);
}
.chat-messages::-webkit-scrollbar{display:none;}

/* date divider */
.date-div{text-align:center;margin:0.75rem 0;}
.date-div span{
  background:rgba(201,168,76,0.1);border:0.5px solid var(--border);
  border-radius:10px;padding:0.2rem 0.75rem;font-size:0.65rem;color:var(--muted);
}

/* messages */
.msg-wrap{display:flex;margin-bottom:0.4rem;align-items:flex-end;gap:0.4rem;}
.msg-wrap.me{flex-direction:row-reverse;}
.msg-avatar-small{
  width:24px;height:24px;border-radius:50%;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:0.75rem;
  flex-shrink:0;border:1px solid var(--border);
}
.bubble{
  max-width:72%;padding:0.55rem 0.85rem;border-radius:16px;
  font-size:0.85rem;line-height:1.5;position:relative;word-break:break-word;
}
.bubble.me{
  background:var(--bubble-me);border:0.5px solid rgba(29,158,117,0.25);
  border-bottom-right-radius:4px;
}
.bubble.them{
  background:var(--bg3);border:0.5px solid var(--border);
  border-bottom-left-radius:4px;
}
.bubble-nick{font-size:0.65rem;color:var(--gold-l);margin-bottom:0.25rem;font-weight:700;}
.bubble-meta{display:flex;align-items:center;justify-content:flex-end;gap:0.3rem;margin-top:0.2rem;}
.bubble-time{font-size:0.6rem;color:var(--muted2);}
.read-ticks{font-size:0.65rem;color:var(--blue);}

/* reply quote */
.reply-quote{
  background:rgba(201,168,76,0.08);border-left:2px solid var(--gold);
  border-radius:6px;padding:0.3rem 0.5rem;margin-bottom:0.4rem;
  font-size:0.72rem;color:var(--muted);
}
.reply-quote strong{color:var(--gold-l);display:block;margin-bottom:0.1rem;font-size:0.68rem;}

/* voice note */
.voice-bubble{display:flex;align-items:center;gap:0.6rem;min-width:160px;}
.play-voice{
  width:30px;height:30px;border-radius:50%;background:var(--gold-d);
  display:flex;align-items:center;justify-content:center;font-size:0.8rem;
  cursor:pointer;flex-shrink:0;border:none;color:#1a1208;
}
.voice-bars{display:flex;align-items:center;gap:2px;flex:1;}
.vbar{width:3px;background:var(--gold);border-radius:2px;transition:height 0.1s;}
.voice-dur{font-size:0.68rem;color:var(--muted);flex-shrink:0;}

/* sticker & media */
.sticker-bubble{font-size:3.5rem;background:transparent!important;border:none!important;padding:0.25rem!important;}
.media-bubble{padding:0.25rem!important;}
.media-img{width:180px;height:130px;border-radius:10px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:3rem;cursor:pointer;border:0.5px solid var(--border);}

/* context menu */
.ctx-menu{
  position:fixed;z-index:200;background:var(--bg2);
  border:0.5px solid var(--border2);border-radius:12px;
  padding:0.4rem 0;min-width:160px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  display:none;
}
.ctx-menu.open{display:block;}
.ctx-item{
  padding:0.6rem 1rem;font-size:0.82rem;cursor:pointer;
  display:flex;align-items:center;gap:0.6rem;transition:background 0.15s;
}
.ctx-item:hover{background:rgba(201,168,76,0.06);}
.ctx-item.danger{color:var(--red);}

/* typing */
.typing-indicator{display:flex;align-items:center;gap:0.4rem;padding:0.4rem 0.75rem;margin-bottom:0.25rem;}
.typing-dots{display:flex;gap:3px;align-items:center;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:tdot 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.typing-text{font-size:0.72rem;color:var(--muted);}

/* join banner in room */
.join-room-banner{
  background:rgba(201,168,76,0.07);border-top:0.5px solid var(--border);
  padding:0.75rem 1rem;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.join-room-text{font-size:0.8rem;color:var(--muted);}
.join-room-btn{
  padding:0.4rem 1rem;background:var(--gold-d);border:none;border-radius:8px;
  color:#1a1208;font-size:0.8rem;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all 0.2s;
}
.join-room-btn:active{transform:scale(0.95);}

/* input bar */
.input-bar{
  background:rgba(10,10,15,0.97);border-top:0.5px solid var(--border);
  padding:0.6rem 0.75rem max(0.6rem,env(safe-area-inset-bottom));
  display:flex;align-items:flex-end;gap:0.5rem;flex-shrink:0;
}
.input-bar.locked{opacity:0.4;pointer-events:none;}
.attach-btn,.emoji-btn,.send-btn{
  width:38px;height:38px;border-radius:50%;border:0.5px solid var(--border);
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  font-size:1rem;cursor:pointer;flex-shrink:0;transition:all 0.2s;
}
.send-btn{background:var(--gold-d);border-color:var(--gold);color:#1a1208;}
.send-btn:active,.attach-btn:active,.emoji-btn:active{transform:scale(0.9);}
.msg-input-wrap{flex:1;position:relative;}
.msg-input{
  width:100%;padding:0.6rem 0.85rem;
  background:var(--bg3);border:0.5px solid var(--border);border-radius:20px;
  color:var(--text);font-size:0.88rem;font-family:inherit;outline:none;resize:none;
  max-height:100px;line-height:1.4;transition:border 0.2s;
}
.msg-input:focus{border-color:var(--border2);}
.msg-input::placeholder{color:var(--muted);}

/* voice record btn */
.voice-btn{
  width:38px;height:38px;border-radius:50%;background:rgba(201,168,76,0.1);
  border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:1rem;cursor:pointer;flex-shrink:0;transition:all 0.2s;
}
.voice-btn.recording{background:rgba(226,75,74,0.3);border-color:var(--red);animation:pulse 0.8s infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* reply preview */
.reply-preview{
  background:rgba(201,168,76,0.07);border-left:2px solid var(--gold);
  padding:0.4rem 0.75rem;display:flex;align-items:center;justify-content:space-between;
  font-size:0.75rem;color:var(--muted);
}
.reply-preview strong{color:var(--gold-l);}
.reply-cancel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.9rem;}

/* sticker picker */
.sticker-picker{
  background:var(--bg2);border-top:0.5px solid var(--border);
  padding:0.75rem;display:none;flex-wrap:wrap;gap:0.4rem;
  max-height:140px;overflow-y:auto;
}
.sticker-picker.open{display:flex;}
.sticker{font-size:1.8rem;cursor:pointer;padding:0.2rem;transition:transform 0.15s;}
.sticker:active{transform:scale(1.3);}

/* attachment sheet */
.attach-sheet{
  position:absolute;bottom:100%;left:0;right:0;
  background:var(--bg2);border:0.5px solid var(--border);border-radius:16px 16px 0 0;
  padding:1rem;display:none;
  grid-template-columns:repeat(4,1fr);gap:0.75rem;z-index:10;
}
.attach-sheet.open{display:grid;}
.attach-opt{display:flex;flex-direction:column;align-items:center;gap:0.35rem;cursor:pointer;}
.attach-opt-icon{
  width:48px;height:48px;border-radius:14px;background:var(--bg3);
  border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.4rem;
  transition:all 0.2s;
}
.attach-opt-icon:active{transform:scale(0.9);}
.attach-opt-label{font-size:0.65rem;color:var(--muted);}
</style>
</head>

let currentChat = null;
let replyTo = null;
let ctxTarget = null;
let isRecording = false;
let typingTimer = null;
let filterTab = 'all';
let filterText = '';

function now() {
  return new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',hour12:false});
}

function buildList() {
  const list = document.getElementById('chat-list');
  list.innerHTML = '';
  CHATS.filter(c => {
    const tabOk = filterTab==='all'||(filterTab==='private'&&c.type==='private')||(filterTab==='groups'&&c.type==='group');
    const searchOk = !filterText || c.nick.toLowerCase().includes(filterText.toLowerCase());
    return tabOk && searchOk;
  }).forEach(chat => {
    const item = document.createElement('div');
    item.className = 'chat-item' + (chat.unread?' unread':'');
    item.onclick = () => openChat(chat.id);
    item.innerHTML = `
      <div class="chat-avatar${chat.type==='group'?' group':''}">
        ${chat.emoji}
        ${chat.online?'<div class="online-dot"></div>':''}
      </div>
      <div class="chat-body">
        <div class="chat-row1">
          <div class="chat-name">${chat.nick}</div>
          <div class="chat-time">${chat.time}</div>
        </div>
        <div class="chat-row2">
          <div class="chat-preview${chat.unread?' bold':''}">${chat.preview}</div>
          ${chat.unread?`<div class="unread-badge">${chat.unread}</div>`:''}
        </div>
        ${!chat.joined?'<div class="join-banner" onclick="event.stopPropagation();joinFromList('+chat.id+')">Tap to Join Group</div>':''}
      </div>`;
    list.appendChild(item);
  });
}

function filterChats() {
  filterText = document.getElementById('search-input').value;
  buildList();
}

function switchTab(btn, tab) {
  filterTab = tab;
  document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  buildList();
}

function joinFromList(id) {
  const chat = CHATS.find(c=>c.id===id);
  if(chat){chat.joined=true; buildList();}
}

function openChat(id) {
  currentChat = CHATS.find(c=>c.id===id);
  currentChat.unread = 0;
  buildList();

  const isGroup = currentChat.type==='group';
  const ct_avatar = document.getElementById('ct-avatar');
  ct_avatar.textContent = currentChat.emoji;
  ct_avatar.className = 'ct-avatar'+(isGroup?' group':'');

  document.getElementById('ct-name').textContent = currentChat.nick;
  const statusEl = document.getElementById('ct-status');
  if (currentChat.online) { statusEl.textContent='● Online'; statusEl.style.color='var(--green)'; }
  else if (isGroup) { statusEl.textContent='👥 '+currentChat.members; statusEl.style.color='var(--muted)'; }
  else { statusEl.textContent='Last seen recently'; statusEl.style.color='var(--muted)'; }

  document.getElementById('ct-online-dot').style.display = currentChat.online?'block':'none';

  const jb = document.getElementById('join-banner');
  jb.style.display = (!currentChat.joined && isGroup) ? 'flex' : 'none';
  document.getElementById('input-bar').classList.toggle('locked', !currentChat.joined && isGroup);

  renderMessages();
  document.getElementById('list-screen').classList.add('hidden');
  document.getElementById('chat-screen').classList.remove('hidden');

  if (currentChat.online) {
    setTimeout(showTyping, 2000);
  }
}

function goBack() {
  document.getElementById('chat-screen').classList.add('hidden');
  document.getElementById('list-screen').classList.remove('hidden');
  clearTimeout(typingTimer);
  document.getElementById('typing-indicator').style.display='none';
  cancelReply();
  closeStickers();
  closeAttach();
}

function joinGroup() {
  currentChat.joined = true;
  document.getElementById('join-banner').style.display='none';
  document.getElementById('input-bar').classList.remove('locked');
  renderMessages();
  buildList();
}

function renderMessages() {
  const cont = document.getElementById('chat-messages');
  cont.innerHTML = '';
  let lastDate = '';
  (currentChat.history||[]).forEach((msg,i) => {
    const dateStr = msg.time.includes(':')?'Today':msg.time;
    if (dateStr !== lastDate) {
      cont.innerHTML += `<div class="date-div"><span>${dateStr}</span></div>`;
      lastDate = dateStr;
    }
    cont.appendChild(buildBubble(msg, i));
  });
  cont.scrollTop = cont.scrollHeight;
}

function buildBubble(msg, idx) {
  const isMe = msg.from==='me';
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap '+(isMe?'me':'them');

  let inner = '';
  if (!isMe && currentChat.type==='group') {
    inner += `<div class="msg-avatar-small">${msg.emoji||'👤'}</div>`;
  }

  let bubbleContent = '';
  if (!isMe && currentChat.type==='group') {
    bubbleContent += `<div class="bubble-nick">@${msg.nick||msg.from}</div>`;
  }

  if (msg.replyTo) {
    bubbleContent += `<div class="reply-quote"><strong>@${msg.replyTo.nick}</strong>${msg.replyTo.text}</div>`;
  }

  if (msg.type==='voice') {
    const bars = Array.from({length:18},()=>`<div class="vbar" style="height:${4+Math.random()*14}px"></div>`).join('');
    bubbleContent += `<div class="voice-bubble"><button class="play-voice" onclick="playVoice(this)">▶</button><div class="voice-bars">${bars}</div><div class="voice-dur">${msg.dur}</div></div>`;
  } else if (msg.type==='sticker') {
    bubbleContent = `<div class="bubble sticker-bubble">${msg.sticker}</div>`;
    wrap.innerHTML = inner + bubbleContent;
    setupCtxEvents(wrap, msg, idx);
    return wrap;
  } else if (msg.type==='media') {
    bubbleContent += `<div class="media-img" onclick="alert('Opening Fullscreen Media View...')">${msg.mediaEmoji}</div>`;
  } else {
    bubbleContent += `<span>${msg.text||''}</span>`;
  }

  const ticks = isMe ? `<span class="read-ticks">${msg.read?'✓✓':'✓'}</span>` : '';
  bubbleContent += `<div class="bubble-meta"><span class="bubble-time">${msg.time}</span>${ticks}</div>`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble '+(isMe?'me':'them')+(msg.type==='media'?' media-bubble':'');
  bubble.innerHTML = bubbleContent;

  wrap.innerHTML = inner;
  wrap.appendChild(bubble);
  setupCtxEvents(bubble, msg, idx);
  return wrap;
}

function setupCtxEvents(element, msg, idx) {
  let pressTimer;
  element.addEventListener('touchstart', e=>{
    pressTimer = setTimeout(()=>showCtx(e.touches[0].clientX, e.touches[0].clientY, msg, idx), 600);
  }, {passive:true});
  element.addEventListener('touchend', ()=>clearTimeout(pressTimer));
  element.addEventListener('contextmenu', e=>{
    e.preventDefault();
    showCtx(e.clientX, e.clientY, msg, idx);
  });
}

function showTyping() {
  if(!currentChat || !currentChat.online) return;
  document.getElementById('typing-text').textContent = currentChat.type==='group' ? `${currentChat.nick} typing...` : 'typing...';
  document.getElementById('typing-indicator').style.display = 'flex';
  document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
}

function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  const msg = {
    id: Date.now(), from:'me', text, time: now(), read:false,
    replyTo: replyTo ? {nick: replyTo.from==='me'?'Me':replyTo.nick||replyTo.from, text:replyTo.text||'[Media]'} : null
  };
  currentChat.history.push(msg);
  currentChat.preview = text;
  input.value='';
  input.style.height='auto';
  cancelReply();
  renderMessages();
  toggleSendVoice();
  buildList();
  if (currentChat.online) {
    document.getElementById('typing-indicator').style.display='none';
    setTimeout(showTyping, 1000);
    setTimeout(simulateReply, 2500);
  }
}

function sendSticker(s) {
  const msg = {id:Date.now(),from:'me',type:'sticker',sticker:s,time:now(),read:false};
  currentChat.history.push(msg);
  currentChat.preview = "Sticker " + s;
  renderMessages();
  closeStickers();
  buildList();
}

function fakeFile(type) {
  const emojis={photo:'🖼️',video:'🎬',file:'📄'};
  const msg={id:Date.now(),from:'me',type:'media',mediaEmoji:emojis[type]||'📎',time:now(),read:false};
  currentChat.history.push(msg);
  currentChat.preview = "Sent a media file";
  renderMessages();
  closeAttach();
  buildList();
}

function fakeVoice() {
  const msg={id:Date.now(),from:'me',type:'voice',dur:'0:07',time:now(),read:false};
  currentChat.history.push(msg);
  currentChat.preview = "🎤 Voice note";
  renderMessages();
  closeAttach();
  buildList();
}

function simulateReply() {
  if (!currentChat || !currentChat.online) return;
  const replies=["Cool! 👍","Definitely!","Haha 😂","Sure thing","That's amazing!","❤️","OK great!","Perfect!"];
  const msg={
    id:Date.now(),from:'them',emoji:currentChat.emoji,
    text:replies[Math.floor(Math.random()*replies.length)],
    time:now(),read:true,
    nick:currentChat.type==='group'?'Member':undefined
  };
  currentChat.history.push(msg);
  currentChat.preview = msg.text;
  document.getElementById('typing-indicator').style.display='none';
  renderMessages();
  buildList();
}

function onType() {
  const input = document.getElementById('msg-input');
  input.style.height='auto';
  input.style.height=Math.min(input.scrollHeight,100)+'px';
  toggleSendVoice();
}

function onKey(e) {
  if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
}

function toggleSendVoice() {
  const has = document.getElementById('msg-input').value.trim().length>0;
  document.getElementById('send-btn').style.display=has?'flex':'none';
  document.getElementById('voice-btn').style.display=has?'none':'flex';
}

function toggleVoiceRecord() {
  const btn = document.getElementById('voice-btn');
  isRecording = !isRecording;
  if(isRecording) {
    btn.classList.add('recording');
    btn.textContent = "🛑";
  } else {
    btn.classList.remove('recording');
    btn.textContent = "🎙️";
    const msg={id:Date.now(),from:'me',type:'voice',dur:'0:12',time:now(),read:false};
    currentChat.history.push(msg);
    currentChat.preview = "🎤 Voice Note";
    renderMessages();
    buildList();
  }
}

function playVoice(btn) {
  if(btn.textContent === "▶") {
    btn.textContent = "⏸";
    setTimeout(()=>{btn.textContent="▶";},3000);
  } else {
    btn.textContent = "▶";
  }
}

function toggleStickers() {
  document.getElementById('sticker-picker').classList.toggle('open');
  closeAttach();
}
function closeStickers() { document.getElementById('sticker-picker').classList.remove('open'); }

function toggleAttach() {
  document.getElementById('attach-sheet').classList.toggle('open');
  closeStickers();
}
function closeAttach() { document.getElementById('attach-sheet').classList.remove('open'); }

/* Context Menu Operations */
function showCtx(x, y, msg, idx) {
  ctxTarget = {msg, idx};
  const menu = document.getElementById('ctx-menu');
  menu.style.top = Math.min(y, window.innerHeight - 200) + 'px';
  menu.style.left = Math.min(x, window.innerWidth - 180) + 'px';
  menu.classList.add('open');
}
function closeCtx() { document.getElementById('ctx-menu').classList.remove('open'); }

function ctxReply() {
  replyTo = ctxTarget.msg;
  document.getElementById('reply-nick').textContent = replyTo.from==='me'?'Me':currentChat.nick;
  document.getElementById('reply-text-preview').textContent = replyTo.text || '[Media/Voice]';
  document.getElementById('reply-preview').style.display = 'flex';
  closeCtx();
}
function cancelReply() {
  replyTo = null;
  document.getElementById('reply-preview').style.display = 'none';
}

function ctxCopy() {
  if(ctxTarget.msg.text) {
    navigator.clipboard.writeText(ctxTarget.msg.text);
    alert('Copied to clipboard!');
  }
  closeCtx();
}

function ctxDelete() {
  currentChat.history.splice(ctxTarget.idx, 1);
  currentChat.preview = currentChat.history.length ? (currentChat.history[currentChat.history.length-1].text || "Media") : "No messages";
  renderMessages();
  buildList();
  closeCtx();
  }

// Initial Run
try {
  buildList();
} catch(e) {
  console.error("Error building list, but keeping buttons alive:", e);
  }

        saveNewGroupToSupabase(groupName);

}

// פֿונקציע צו שיקן דעם נאָמען צו Supabase
async function saveNewGroupToSupabase(name) {
    try {
        // מיר טשעקן צו זען אויב Supabase איז גרייט
        if (typeof window.sb === 'undefined' || !window.sb) {
            throw new Error("Supabase is not initialized. Please refresh.");
        }

        const { data, error } = await window.sb
            .from('groups')
            .insert([{ name: name, created_at: new Date() }]);

        if (error) throw error;

        alert("✅ גרופּע '" + name + "' איז געשאפן געוואָרן!");
        
        // ריפרעשן די רשימה
        if (typeof loadGroups === 'function') {
            loadGroups();
        } else {
            location.reload(); 
        }
    } catch (err) {
        alert("❌ Error: " + err.message);
        console.error(err);
    }
}
</script>
