<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YID PLUS — Music</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#C9A84C;--gold-l:#F0D080;--gold-d:#8B6914;
  --bg:#0A0A0F;--bg2:#13131A;--bg3:#1C1C26;--bg4:#222230;
  --border:rgba(201,168,76,0.18);--border2:rgba(201,168,76,0.45);
  --text:#F0EDE6;--muted:#8A8070;--muted2:#5A5448;
  --red:#E24B4A;--green:#1D9E75;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:Georgia,serif;color:var(--text);}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;transition:transform 0.32s cubic-bezier(0.32,0.72,0,1);}
.screen.hidden{transform:translateX(100%);}

.topbar{background:rgba(10,10,15,0.97);border-bottom:0.5px solid var(--border);padding:0.75rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-logo{font-size:1.1rem;font-weight:700;letter-spacing:0.1em;background:linear-gradient(135deg,var(--gold-l),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.topbar-icons{display:flex;gap:0.5rem;}
.icon-btn{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.9rem;cursor:pointer;transition:all 0.2s;}
.icon-btn:active{transform:scale(0.9);}

.music-tabs{display:flex;gap:0;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.mtab{flex:1;padding:0.65rem 0.3rem;text-align:center;font-size:0.72rem;letter-spacing:0.03em;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}
.mtab.active{color:var(--gold);border-bottom-color:var(--gold);}

.music-scroll{flex:1;overflow-y:auto;scrollbar-width:none;padding-bottom:150px;}
.music-scroll::-webkit-scrollbar{display:none;}

.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:1rem 1rem 0.5rem;}
.section-hdr h2{font-size:0.88rem;letter-spacing:0.04em;}
.see-all{font-size:0.73rem;color:var(--gold);cursor:pointer;border:none;background:none;font-family:inherit;}

.trending-badge{display:inline-flex;align-items:center;gap:0.3rem;background:rgba(201,168,76,0.12);border:0.5px solid var(--border2);border-radius:20px;padding:0.15rem 0.55rem;font-size:0.62rem;color:var(--gold);margin-left:0.4rem;vertical-align:middle;}

/* albums */
.albums-row{display:flex;gap:0.75rem;overflow-x:auto;padding:0 1rem 0.75rem;scrollbar-width:none;}
.albums-row::-webkit-scrollbar{display:none;}
.album-card{flex-shrink:0;width:128px;cursor:pointer;transition:transform 0.18s;}
.album-card:active{transform:scale(0.95);}
.album-cover{width:128px;height:128px;border-radius:12px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:3.5rem;border:0.5px solid var(--border);position:relative;overflow:hidden;margin-bottom:0.4rem;}
.album-cover-bg{position:absolute;inset:0;opacity:0.15;display:flex;align-items:center;justify-content:center;font-size:8rem;filter:blur(10px);}
.album-cover-emoji{position:relative;z-index:1;}
.trending-star{position:absolute;top:6px;right:6px;background:var(--gold);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;z-index:2;}
.album-name{font-size:0.78rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.album-artist{font-size:0.66rem;color:var(--muted);}
.album-tracks{font-size:0.62rem;color:var(--muted2);margin-top:0.1rem;}

/* track item */
.singles-list{padding:0 1rem;}
.track-item{display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0;border-bottom:0.5px solid rgba(201,168,76,0.06);cursor:pointer;transition:background 0.15s;border-radius:8px;}
.track-item:active{background:rgba(201,168,76,0.04);}
.track-thumb{width:46px;height:46px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;border:0.5px solid var(--border);position:relative;overflow:hidden;}
.track-thumb-bg{position:absolute;inset:0;opacity:0.15;display:flex;align-items:center;justify-content:center;font-size:4rem;filter:blur(6px);}
.track-thumb-emoji{position:relative;z-index:1;}
.playing-bars{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;gap:2px;padding:6px;background:rgba(0,0,0,0.5);z-index:2;}
.pbar{width:3px;background:var(--gold);border-radius:2px;animation:pbar 0.8s ease-in-out infinite;}
.pbar:nth-child(2){animation-delay:0.2s;}
.pbar:nth-child(3){animation-delay:0.4s;}
@keyframes pbar{0%,100%{height:4px}50%{height:14px}}
.track-info{flex:1;min-width:0;}
.track-name{font-size:0.84rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.track-name.playing{color:var(--gold);}
.track-artist{font-size:0.68rem;color:var(--muted);margin-top:0.1rem;}
.track-dur{font-size:0.68rem;color:var(--muted2);flex-shrink:0;}
.track-heart{font-size:1rem;cursor:pointer;transition:transform 0.15s;padding:0.25rem;flex-shrink:0;}
.track-heart:active{transform:scale(1.3);}
.track-more{font-size:0.9rem;cursor:pointer;color:var(--muted);padding:0.25rem;flex-shrink:0;}

/* music videos */
.mv-row{display:flex;gap:0.75rem;overflow-x:auto;padding:0 1rem 0.75rem;scrollbar-width:none;}
.mv-row::-webkit-scrollbar{display:none;}
.mv-card{flex-shrink:0;width:188px;cursor:pointer;transition:transform 0.18s;}
.mv-card:active{transform:scale(0.96);}
.mv-thumb{width:188px;height:106px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:3rem;border:0.5px solid var(--border);position:relative;margin-bottom:0.4rem;overflow:hidden;}
.mv-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.25);}
.mv-play-icon{width:38px;height:38px;border-radius:50%;background:rgba(201,168,76,0.9);display:flex;align-items:center;justify-content:center;font-size:1rem;}
.mv-name{font-size:0.78rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mv-artist{font-size:0.66rem;color:var(--muted);}

/* ── FULL PLAYER ── */
.player-topbar{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem;flex-shrink:0;}
.player-back{font-size:1.3rem;color:var(--gold);cursor:pointer;}
.player-title{font-size:0.73rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);}
.player-scroll{flex:1;overflow-y:auto;scrollbar-width:none;}
.player-scroll::-webkit-scrollbar{display:none;}

.mode-toggle{display:flex;background:var(--bg3);border:0.5px solid var(--border);border-radius:10px;padding:3px;margin:0 1.25rem 1.25rem;}
.mode-btn{flex:1;padding:0.45rem;text-align:center;font-size:0.76rem;letter-spacing:0.04em;border-radius:8px;cursor:pointer;color:var(--muted);transition:all 0.22s;border:none;background:transparent;font-family:inherit;}
.mode-btn.active{background:var(--bg2);color:var(--gold);border:0.5px solid var(--border);}

.artwork-wrap{padding:0 1.75rem;margin-bottom:1.25rem;}
.artwork{width:100%;aspect-ratio:1;border-radius:20px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:7rem;border:0.5px solid var(--border);position:relative;overflow:hidden;transition:all 0.4s;}
.artwork-bg{position:absolute;inset:0;opacity:0.12;display:flex;align-items:center;justify-content:center;font-size:20rem;filter:blur(30px);}
.artwork-emoji{position:relative;z-index:1;}
.artwork.playing .artwork-emoji{animation:artPulse 2s ease-in-out infinite;}
@keyframes artPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

.video-player{margin:0 1rem 1.25rem;border-radius:14px;background:#111;aspect-ratio:16/9;display:none;align-items:center;justify-content:center;font-size:5rem;border:0.5px solid var(--border);position:relative;overflow:hidden;cursor:pointer;}
.video-player.show{display:flex;}
.vp-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.25);}
.vp-play-btn{width:56px;height:56px;border-radius:50%;background:rgba(201,168,76,0.9);display:flex;align-items:center;justify-content:center;font-size:1.4rem;}

.track-meta{padding:0 1.25rem;margin-bottom:0.75rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.now-name{font-size:1.05rem;font-weight:700;}
.now-artist{font-size:0.8rem;color:var(--muted);margin-top:0.2rem;}
.meta-actions{display:flex;gap:0.5rem;align-items:center;}
.heart-big{font-size:1.5rem;cursor:pointer;transition:transform 0.18s;}
.heart-big:active{transform:scale(1.3);}
.share-btn{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.82rem;cursor:pointer;}

.progress-wrap{padding:0 1.25rem;margin-bottom:0.5rem;}
.progress-bar{width:100%;height:4px;background:var(--bg4);border-radius:2px;cursor:pointer;position:relative;margin-bottom:0.4rem;}
.progress-fill{height:100%;background:linear-gradient(to right,var(--gold-d),var(--gold));border-radius:2px;width:0%;pointer-events:none;}
.progress-dot{position:absolute;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:var(--gold);left:0%;margin-left:-6px;pointer-events:none;}
.progress-times{display:flex;justify-content:space-between;font-size:0.65rem;color:var(--muted);}

.controls{display:flex;align-items:center;justify-content:space-between;padding:0 1rem;margin-bottom:1rem;}
.ctrl-btn{width:42px;height:42px;border-radius:50%;background:transparent;border:none;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all 0.18s;}
.ctrl-btn:active{transform:scale(0.9);}
.ctrl-btn.on{color:var(--gold);}
.play-big{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--gold-d),var(--gold));border:none;font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#1a1208;transition:all 0.18s;box-shadow:0 4px 20px rgba(201,168,76,0.3);}
.play-big:active{transform:scale(0.93);}

.queue-section{padding:0 1rem 1rem;}
.queue-hdr{font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:0.6rem;padding-top:0.5rem;border-top:0.5px solid var(--border);}
.queue-item{display:flex;align-items:center;gap:0.6rem;padding:0.45rem 0;border-bottom:0.5px solid rgba(201,168,76,0.05);cursor:pointer;}
.queue-num{font-size:0.7rem;color:var(--muted2);width:16px;text-align:center;flex-shrink:0;}
.queue-thumb{width:34px;height:34px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.queue-info{flex:1;min-width:0;}
.queue-name{font-size:0.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.queue-artist{font-size:0.63rem;color:var(--muted);}

/* album detail */
.album-topbar{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;flex-shrink:0;border-bottom:0.5px solid var(--border);}
.album-back{font-size:1.3rem;color:var(--gold);cursor:pointer;}
.album-detail-scroll{flex:1;overflow-y:auto;scrollbar-width:none;padding-bottom:150px;}
.album-detail-scroll::-webkit-scrollbar{display:none;}
.album-hero{padding:1.25rem 1.25rem 0.75rem;display:flex;gap:1rem;align-items:flex-end;}
.album-hero-art{width:108px;height:108px;border-radius:14px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:3.5rem;border:0.5px solid var(--border);flex-shrink:0;}
.album-hero-label{font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:0.25rem;}
.album-hero-name{font-size:1.05rem;font-weight:700;line-height:1.3;}
.album-hero-artist{font-size:0.78rem;color:var(--muted);margin-top:0.2rem;}
.album-hero-year{font-size:0.68rem;color:var(--muted2);margin-top:0.1rem;}
.album-play-row{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1.25rem;}
.album-play-btn{padding:0.5rem 1.5rem;background:linear-gradient(135deg,var(--gold-d),var(--gold));border:none;border-radius:20px;color:#1a1208;font-size:0.83rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.album-play-btn:active{transform:scale(0.96);}
.album-shuffle-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;}

/* mini player */
.mini-player{position:fixed;bottom:56px;left:0;right:0;z-index:70;background:rgba(19,19,26,0.97);border-top:0.5px solid var(--border2);backdrop-filter:blur(16px);display:none;align-items:center;gap:0.75rem;padding:0.6rem 1rem;cursor:pointer;}
.mini-player.show{display:flex;}
.mini-progress{position:absolute;top:0;left:0;height:2px;background:var(--gold);border-radius:0;}
.mini-thumb{width:40px;height:40px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;border:0.5px solid var(--border);}
.mini-info{flex:1;min-width:0;}
.mini-name{font-size:0.82rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mini-artist{font-size:0.67rem;color:var(--muted);}
.mini-controls{display:flex;align-items:center;gap:0.4rem;}
.mini-btn{font-size:1.1rem;cursor:pointer;border:none;background:none;color:var(--text);}
.mini-play{width:32px;height:32px;border-radius:50%;background:var(--gold-d);border:none;font-size:0.95rem;display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* bottom nav */
.bottom-nav{background:rgba(10,10,15,0.97);backdrop-filter:blur(12px);border-top:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:0.6rem 0 max(0.6rem,env(safe-area-inset-bottom));flex-shrink:0;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:0.2rem;cursor:pointer;padding:0.3rem 0.75rem;flex:1;}
.nav-icon{font-size:1.2rem;}
.nav-label{font-size:0.58rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);}
.nav-item.active .nav-label{color:var(--gold);}
</style>
</head>
<body>

<!-- MAIN -->
<div class="screen" id="main-screen">
  <div class="topbar">
    <div class="topbar-logo">👑 Music</div>
    <div class="topbar-icons">
      <div class="icon-btn" onclick="alert('Search')">🔍</div>
      <div class="icon-btn" onclick="openLiked()">❤️</div>
      <div class="icon-btn" onclick="alert('Upload music')">＋</div>
    </div>
  </div>
  <div class="music-tabs">
    <button class="mtab active" onclick="switchMtab(this,'all')">All</button>
    <button class="mtab" onclick="switchMtab(this,'albums')">Albums</button>
    <button class="mtab" onclick="switchMtab(this,'singles')">Singles</button>
    <button class="mtab" onclick="switchMtab(this,'videos')">Videos</button>
    <button class="mtab" onclick="switchMtab(this,'liked')">❤️ Liked</button>
  </div>
  <div class="music-scroll">
    <div id="sec-albums">
      <div class="section-hdr"><h2>💿 Albums & CDs</h2><button class="see-all">See All →</button></div>
      <div class="albums-row" id="albums-row"></div>
    </div>
    <div id="sec-singles">
      <div class="section-hdr"><h2>🎵 Singles</h2><button class="see-all">See All →</button></div>
      <div class="singles-list" id="singles-list"></div>
    </div>
    <div id="sec-videos">
      <div class="section-hdr"><h2>🎬 Music Videos</h2><button class="see-all">See All →</button></div>
      <div class="mv-row" id="mv-row"></div>
    </div>
    <div id="sec-liked" style="display:none">
      <div class="section-hdr"><h2>❤️ My Liked Songs</h2></div>
      <div class="singles-list" id="liked-list"></div>
    </div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item" onclick="setNav(this)"><div class="nav-icon">🏠</div><div class="nav-label">Home</div></div>
    <div class="nav-item" onclick="setNav(this)"><div class="nav-icon">🎬</div><div class="nav-label">Shorts</div></div>
    <div class="nav-item active" onclick="setNav(this)"><div class="nav-icon">🎵</div><div class="nav-label">Music</div></div>
    <div class="nav-item" onclick="setNav(this)"><div class="nav-icon">💬</div><div class="nav-label">Chats</div></div>
    <div class="nav-item" onclick="setNav(this)"><div class="nav-icon">⚙️</div><div class="nav-label">Settings</div></div>
  </div>
</div>

<!-- FULL PLAYER -->
<div class="screen hidden" id="player-screen">
  <div class="player-topbar">
    <div class="player-back" onclick="closePlayer()">‹</div>
    <div class="player-title">Now Playing</div>
    <div class="icon-btn" onclick="shareTrack()">📤</div>
  </div>
  <div class="player-scroll">
    <div class="mode-toggle">
      <button class="mode-btn active" id="song-btn" onclick="setMode('song')">🎵 Song Mode</button>
      <button class="mode-btn" id="video-btn" onclick="setMode('video')">🎬 Video Mode</button>
    </div>
    <div class="artwork-wrap" id="artwork-wrap">
      <div class="artwork playing" id="artwork">
        <div class="artwork-bg" id="art-bg"></div>
        <div class="artwork-emoji" id="art-emoji">🎹</div>
      </div>
    </div>
    <div class="video-player" id="video-player" onclick="togglePlay()">
      <div id="vp-emoji" style="position:relative;z-index:1;font-size:4.5rem"></div>
      <div class="vp-overlay" id="vp-overlay"><div class="vp-play-btn" id="vp-btn">⏸</div></div>
    </div>
    <div class="track-meta">
      <div>
        <div class="now-name" id="now-name">Track</div>
        <div class="now-artist" id="now-artist">Artist</div>
      </div>
      <div class="meta-actions">
        <div class="heart-big" id="heart-big" onclick="toggleLike()">🤍</div>
        <div class="share-btn" onclick="shareTrack()">📤</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="prog-bar" onclick="seekTo(event)">
        <div class="progress-fill" id="prog-fill"></div>
        <div class="progress-dot" id="prog-dot"></div>
      </div>
      <div class="progress-times"><span id="t-cur">0:00</span><span id="t-tot">0:00</span></div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="shuf-btn" onclick="toggleShuffle()">🔀</button>
      <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
      <button class="play-big" id="play-big" onclick="togglePlay()">⏸</button>
      <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
      <button class="ctrl-btn" id="rep-btn" onclick="toggleRepeat()">🔁</button>
    </div>
    <div class="queue-section">
      <div class="queue-hdr">Up Next</div>
      <div id="queue-list"></div>
    </div>
  </div>
</div>

<!-- ALBUM DETAIL -->
<div class="screen hidden" id="album-screen">
  <div class="album-topbar">
    <div class="album-back" onclick="closeAlbum()">‹</div>
    <div style="font-size:0.85rem;font-weight:700" id="alb-screen-title">Album</div>
  </div>
  <div class="album-detail-scroll">
    <div class="album-hero">
      <div class="album-hero-art" id="alb-art"></div>
      <div>
        <div class="album-hero-label">Album</div>
        <div class="album-hero-name" id="alb-name"></div>
        <div class="album-hero-artist" id="alb-artist"></div>
        <div class="album-hero-year" id="alb-year"></div>
      </div>
    </div>
    <div class="album-play-row">
      <button class="album-play-btn" onclick="playAlbum()">▶ Play All</button>
      <div class="album-shuffle-btn" onclick="alert('Shuffling...')">🔀</div>
    </div>
    <div class="singles-list" id="alb-tracks"></div>
  </div>
</div>

<!-- MINI PLAYER -->
<div class="mini-player" id="mini-player" onclick="openPlayer()">
  <div class="mini-progress" id="mini-prog"></div>
  <div class="mini-thumb" id="mini-thumb">🎹</div>
  <div class="mini-info">
    <div class="mini-name" id="mini-name">Track</div>
    <div class="mini-artist" id="mini-artist">Artist</div>
  </div>
  <div class="mini-controls" onclick="event.stopPropagation()">
    <button class="mini-btn" onclick="prevTrack()">⏮</button>
    <button class="mini-play" id="mini-play" onclick="togglePlay()">⏸</button>
    <button class="mini-btn" onclick="nextTrack()">⏭</button>
  </div>
</div>

<script>
const ALBUMS=[
  {id:'a1',emoji:'🎹',bg:'#1a0a2e',name:'Niggunim Vol. 3',artist:'Moshe Levi',year:'2024',tracks:8,trending:true,
   tl:[{n:'Shabbos Morning',d:'3:42'},{n:'Maariv Nigun',d:'4:15'},{n:'Havdalah',d:'2:58'},{n:'Friday Night',d:'5:01'},{n:'Zemirot',d:'3:33'},{n:'Kiddush',d:'2:47'},{n:'Al Hanisim',d:'4:22'},{n:'Closing Niggun',d:'6:10'}]},
  {id:'a2',emoji:'🎤',bg:'#001020',name:'Soulful Beats',artist:'ShlomoBeats',year:'2024',tracks:10,trending:false,
   tl:[{n:'Opening',d:'2:55'},{n:'Dance Floor',d:'3:48'},{n:'Sunrise Prayer',d:'4:12'},{n:'Midnight',d:'3:29'},{n:'Unity',d:'5:15'},{n:'Celebration',d:'3:07'},{n:'Reflection',d:'4:44'},{n:'Journey',d:'3:55'},{n:'Together',d:'4:01'},{n:'Finale',d:'6:30'}]},
  {id:'a3',emoji:'🎻',bg:'#0a1a0a',name:'Klezmer Dreams',artist:'FiddlerNY',year:'2023',tracks:6,trending:true,
   tl:[{n:'Wedding Dance',d:'3:20'},{n:'Village Song',d:'4:45'},{n:'Old Country',d:'3:55'},{n:'Hora Night',d:'5:10'},{n:'Sunset Melody',d:'3:38'},{n:'Farewell',d:'4:22'}]},
  {id:'a4',emoji:'🕎',bg:'#1a1000',name:'Chanukah Collection',artist:'Various Artists',year:'2024',tracks:12,trending:false,
   tl:[{n:'Maoz Tzur',d:'2:45'},{n:'Candle Dance',d:'3:15'},{n:'Eight Nights',d:'4:00'},{n:'Latke Song',d:'2:30'},{n:'Miracle',d:'5:05'},{n:'Dreidel Mix',d:'3:22'}]},
];
const SINGLES=[
  {id:'s1',emoji:'🎵',bg:'#100020',name:'Am Yisrael Chai',artist:'ShlomoBeats',dur:'3:45',liked:true,hasVideo:true,trending:true},
  {id:'s2',emoji:'🕊️',bg:'#0a1a0a',name:'Shalom Aleichem',artist:'Moshe Levi',dur:'4:12',liked:false,hasVideo:false,trending:false},
  {id:'s3',emoji:'🌅',bg:'#1a0f00',name:'Modeh Ani',artist:'RebbeChoir',dur:'2:58',liked:true,hasVideo:false,trending:true},
  {id:'s4',emoji:'🎺',bg:'#001a1a',name:'Rosh Hashana',artist:'KlezmerBand',dur:'5:20',liked:false,hasVideo:true,trending:false},
  {id:'s5',emoji:'🌙',bg:'#0a0020',name:'Lecha Dodi',artist:'ShlomoBeats',dur:'4:08',liked:false,hasVideo:false,trending:true},
  {id:'s6',emoji:'🔥',bg:'#1a0500',name:'Simchas Torah',artist:'FiddlerNY',dur:'3:33',liked:true,hasVideo:true,trending:false},
];
const MVS=[
  {id:'mv1',emoji:'🎹',name:'Niggun #1 — Official MV',artist:'Moshe Levi',views:'112K'},
  {id:'mv2',emoji:'🎤',name:'Am Yisrael Chai (MV)',artist:'ShlomoBeats',views:'87K'},
  {id:'mv3',emoji:'🎻',name:'Wedding Dance (Live)',artist:'FiddlerNY',views:'44K'},
  {id:'mv4',emoji:'🕎',name:'Maoz Tzur (Animated)',artist:'Various',views:'211K'},
];

let allTracks=[];
let likedSet=new Set(['s1','s3','s6']);
let curTrack=null,curIdx=0,playing=true,prog=0,totalSec=0;
let shuffleOn=false,repeatOn=false,progTimer=null,curMode='song',curAlbum=null;

function buildAll(){
  allTracks=[...SINGLES];
  ALBUMS.forEach(a=>a.tl.forEach((t,i)=>allTracks.push({id:a.id+'_'+i,emoji:a.emoji,bg:a.bg,name:t.n,artist:a.artist,dur:t.d,hasVideo:false,trending:a.trending})));
}
buildAll();

/* ── BUILD ALBUMS ── */
function buildAlbums(){
  const r=document.getElementById('albums-row'); r.innerHTML='';
  ALBUMS.forEach(a=>{
    const c=document.createElement('div'); c.className='album-card'; c.onclick=()=>openAlbum(a);
    c.innerHTML=`<div class="album-cover" style="background:${a.bg}"><div class="album-cover-bg">${a.emoji}</div><div class="album-cover-emoji">${a.emoji}</div>${a.trending?'<div class="trending-star">⭐</div>':''}</div><div class="album-name">${a.name}</div><div class="album-artist">${a.artist}</div><div class="album-tracks">${a.tracks} tracks · ${a.year}</div>`;
    r.appendChild(c);
  });
}

/* ── BUILD TRACK LIST ── */
function buildTracks(elId,list){
  const el=document.getElementById(elId); el.innerHTML='';
  list.forEach((t,i)=>{
    const isP=curTrack&&curTrack.id===t.id&&playing;
    const liked=likedSet.has(t.id);
    const item=document.createElement('div');
    item.className='track-item'; item.onclick=()=>playTrack(t);
    item.innerHTML=`
      <div class="track-thumb" style="background:${t.bg||'var(--bg3)'}">
        <div class="track-thumb-bg">${t.emoji}</div>
        <div class="track-thumb-emoji">${t.emoji}</div>
        ${isP?'<div class="playing-bars"><div class="pbar"></div><div class="pbar"></div><div class="pbar"></div></div>':''}
      </div>
      <div class="track-info">
        <div class="track-name${isP?' playing':''}">${t.name}${t.trending?'<span class="trending-badge">⭐ Trending</span>':''}</div>
        <div class="track-artist">${t.artist}${t.hasVideo?' · 🎬':''}</div>
      </div>
      <div class="track-dur">${t.dur}</div>
      <div class="track-heart" onclick="event.stopPropagation();heartTrack(this,'${t.id}')">${liked?'❤️':'🤍'}</div>
      <div class="track-more" onclick="event.stopPropagation();shareTrackById('${t.id}')">📤</div>`;
    el.appendChild(item);
  });
}

/* ── BUILD MVS ── */
function buildMVs(){
  const r=document.getElementById('mv-row'); r.innerHTML='';
  MVS.forEach(mv=>{
    const c=document.createElement('div'); c.className='mv-card';
    c.onclick=()=>{playTrack({id:mv.id,emoji:mv.emoji,bg:'#111',name:mv.name,artist:mv.artist,dur:'3:45',hasVideo:true,trending:false});setMode('video');}
    c.innerHTML=`<div class="mv-thumb">${mv.emoji}<div class="mv-play"><div class="mv-play-icon">▶</div></div></div><div class="mv-name">${mv.name}</div><div class="mv-artist">${mv.artist} · 👁 ${mv.views}</div>`;
    r.appendChild(c);
  });
}

function buildLiked(){buildTracks('liked-list',SINGLES.filter(t=>likedSet.has(t.id)));}

/* ── PLAY ── */
function playTrack(t){
  curTrack=t; curIdx=allTracks.findIndex(x=>x.id===t.id); if(curIdx<0)curIdx=0;
  playing=true; prog=0;
  const parts=t.dur.split(':'); totalSec=parseInt(parts[0])*60+parseInt(parts[1]);
  document.getElementById('now-name').textContent=t.name;
  document.getElementById('now-artist').textContent=t.artist;
  document.getElementById('art-emoji').textContent=t.emoji;
  document.getElementById('art-bg').textContent=t.emoji;
  document.getElementById('artwork').style.background=t.bg||'var(--bg3)';
  document.getElementById('vp-emoji').textContent=t.emoji;
  document.getElementById('heart-big').textContent=likedSet.has(t.id)?'❤️':'🤍';
  document.getElementById('t-tot').textContent=t.dur;
  document.getElementById('mini-thumb').textContent=t.emoji;
  document.getElementById('mini-name').textContent=t.name;
  document.getElementById('mini-artist').textContent=t.artist;
  document.getElementById('mini-player').classList.add('show');
  setPBtn('⏸');
  startProg();
  buildQueue();
  buildTracks('singles-list',SINGLES);
  buildLiked();
  openPlayer();
}

function startProg(){
  clearInterval(progTimer);
  progTimer=setInterval(()=>{
    if(!playing)return;
    prog=Math.min(1,prog+1/totalSec);
    const pct=(prog*100).toFixed(2)+'%';
    document.getElementById('prog-fill').style.width=pct;
    document.getElementById('prog-dot').style.left=pct;
    document.getElementById('mini-prog').style.width=pct;
    const c=Math.floor(prog*totalSec);
    document.getElementById('t-cur').textContent=Math.floor(c/60)+':'+String(c%60).padStart(2,'0');
    if(prog>=1){clearInterval(progTimer);nextTrack();}
  },1000);
}

function togglePlay(){
  playing=!playing;
  setPBtn(playing?'⏸':'▶');
  document.getElementById('artwork').classList.toggle('playing',playing);
}
function setPBtn(ic){
  document.getElementById('play-big').textContent=ic;
  document.getElementById('mini-play').textContent=ic;
  document.getElementById('vp-btn').textContent=ic;
}
function nextTrack(){
  const ni=shuffleOn?Math.floor(Math.random()*allTracks.length):curIdx+1;
  if(ni<allTracks.length) playTrack(allTracks[ni]);
  else if(repeatOn) playTrack(allTracks[0]);
}
function prevTrack(){if(curIdx>0)playTrack(allTracks[curIdx-1]);}
function toggleShuffle(){shuffleOn=!shuffleOn;document.getElementById('shuf-btn').classList.toggle('on',shuffleOn);}
function toggleRepeat(){repeatOn=!repeatOn;document.getElementById('rep-btn').classList.toggle('on',repeatOn);}
function seekTo(e){const b=document.getElementById('prog-bar');const r=b.getBoundingClientRect();prog=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));startProg();}
function toggleLike(){if(!curTrack)return;const id=curTrack.id;if(likedSet.has(id)){likedSet.delete(id);document.getElementById('heart-big').textContent='🤍';}else{likedSet.add(id);document.getElementById('heart-big').textContent='❤️';}buildTracks('singles-list',SINGLES);buildLiked();}
function heartTrack(el,id){if(likedSet.has(id)){likedSet.delete(id);el.textContent='🤍';}else{likedSet.add(id);el.textContent='❤️';}if(curTrack&&curTrack.id===id)document.getElementById('heart-big').textContent=el.textContent;buildLiked();}
function shareTrack(){if(curTrack)alert('Share "'+curTrack.name+'" to chat:\nyidplus.com/music/'+curTrack.id);}
function shareTrackById(id){const t=allTracks.find(x=>x.id===id);if(t)alert('Share "'+t.name+'" to chat:\nyidplus.com/music/'+id);}

/* ── MODE ── */
function setMode(m){
  curMode=m;
  document.getElementById('song-btn').classList.toggle('active',m==='song');
  document.getElementById('video-btn').classList.toggle('active',m==='video');
  document.getElementById('artwork-wrap').style.display=m==='song'?'block':'none';
  document.getElementById('video-player').classList.toggle('show',m==='video');
}

/* ── QUEUE ── */
function buildQueue(){
  const ql=document.getElementById('queue-list'); ql.innerHTML='';
  allTracks.slice(curIdx+1,curIdx+6).forEach((t,i)=>{
    const item=document.createElement('div'); item.className='queue-item'; item.onclick=()=>playTrack(t);
    item.innerHTML=`<div class="queue-num">${i+1}</div><div class="queue-thumb">${t.emoji}</div><div class="queue-info"><div class="queue-name">${t.name}</div><div class="queue-artist">${t.artist}</div></div><div style="font-size:0.68rem;color:var(--muted2)">${t.dur}</div>`;
    ql.appendChild(item);
  });
}

/* ── SCREENS ── */
function openPlayer(){document.getElementById('player-screen').classList.remove('hidden');document.getElementById('main-screen').classList.add('hidden');document.getElementById('album-screen').classList.add('hidden');}
function closePlayer(){document.getElementById('player-screen').classList.add('hidden');document.getElementById('main-screen').classList.remove('hidden');}
function openAlbum(a){
  curAlbum=a;
  document.getElementById('alb-screen-title').textContent=a.name;
  document.getElementById('alb-art').textContent=a.emoji;
  document.getElementById('alb-art').style.background=a.bg;
  document.getElementById('alb-name').textContent=a.name;
  document.getElementById('alb-artist').textContent=a.artist;
  document.getElementById('alb-year').textContent=a.year+' · '+a.tracks+' tracks';
  buildTracks('alb-tracks',a.tl.map((t,i)=>({id:a.id+'_'+i,emoji:a.emoji,bg:a.bg,name:t.n,artist:a.artist,dur:t.d,hasVideo:false,trending:a.trending})));
  document.getElementById('album-screen').classList.remove('hidden');
  document.getElementById('main-screen').classList.add('hidden');
}
function closeAlbum(){document.getElementById('album-screen').classList.add('hidden');document.getElementById('main-screen').classList.remove('hidden');}
function playAlbum(){if(!curAlbum)return;const t=curAlbum.tl[0];playTrack({id:curAlbum.id+'_0',emoji:curAlbum.emoji,bg:curAlbum.bg,name:t.n,artist:curAlbum.artist,dur:t.d,hasVideo:false,trending:curAlbum.trending});}

/* ── TABS ── */
function switchMtab(btn,tab){
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active')); btn.classList.add('active');
  document.getElementById('sec-albums').style.display=(tab==='all'||tab==='albums')?'block':'none';
  document.getElementById('sec-singles').style.display=(tab==='all'||tab==='singles')?'block':'none';
  document.getElementById('sec-videos').style.display=(tab==='all'||tab==='videos')?'block':'none';
  document.getElementById('sec-liked').style.display=tab==='liked'?'block':'none';
  if(tab==='liked')buildLiked();
}
function openLiked(){document.querySelectorAll('.mtab').forEach((t,i)=>t.classList.toggle('active',i===4));switchMtab(document.querySelectorAll('.mtab')[4],'liked');}
function setNav(el){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));el.classList.add('active');}

/* ── INIT ── */
buildAlbums(); buildTracks('singles-list',SINGLES); buildMVs(); buildLiked();
playTrack(SINGLES[0]); closePlayer();
</script>
</body>
</html>
