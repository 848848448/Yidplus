<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YID PLUS — Shorts</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#C9A84C;--gold-l:#F0D080;--gold-d:#8B6914;
  --bg:#000;--bg2:rgba(0,0,0,0.6);--bg3:rgba(255,255,255,0.08);
  --text:#fff;--muted:rgba(255,255,255,0.65);
  --red:#E24B4A;--green:#1D9E75;
}
html,body{height:100%;overflow:hidden;background:#000;font-family:Georgia,serif;color:#fff;}

/* ─── TOP BAR ─── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:0.75rem 1rem;
  background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);
  pointer-events:none;
}
.topbar-logo{
  font-size:1.1rem;font-weight:700;letter-spacing:0.1em;
  background:linear-gradient(135deg,var(--gold-l),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  pointer-events:auto;
}
.topbar-title{font-size:0.95rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.9);}
.upload-btn{
  width:36px;height:36px;border-radius:50%;background:rgba(201,168,76,0.2);
  border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;cursor:pointer;pointer-events:auto;transition:all 0.2s;
}
.upload-btn:active{transform:scale(0.92);}

/* ─── SWIPE CONTAINER ─── */
.swipe-container{
  height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;
  scrollbar-width:none;-ms-overflow-style:none;
}
.swipe-container::-webkit-scrollbar{display:none;}

/* ─── VIDEO SLIDE ─── */
.short{
  height:100vh;width:100%;position:relative;
  scroll-snap-align:start;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:#000;
}
.short-bg{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:8rem;filter:blur(30px);opacity:0.3;transform:scale(1.2);
  pointer-events:none;
}
.short-emoji-center{
  font-size:7rem;z-index:1;
  animation:floatEmoji 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes floatEmoji{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* ─── BOTTOM GRADIENT ─── */
.short-gradient{
  position:absolute;bottom:0;left:0;right:0;height:65%;
  background:linear-gradient(to top,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0.4) 60%,transparent 100%);
  pointer-events:none;z-index:2;
}

/* ─── LEFT INFO ─── */
.short-info{
  position:absolute;bottom:90px;left:0;right:80px;padding:0 1rem;z-index:3;
}
.short-channel{
  display:inline-flex;align-items:center;gap:0.4rem;
  margin-bottom:0.5rem;cursor:pointer;
}
.short-avatar{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.12);border:1.5px solid var(--gold);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  flex-shrink:0;
}
.short-nick{font-size:0.9rem;font-weight:700;}
.verified{font-size:0.75rem;}
.follow-pill{
  display:inline-block;margin-left:0.3rem;
  padding:0.1rem 0.5rem;border-radius:10px;
  background:rgba(201,168,76,0.18);border:0.5px solid var(--gold);
  font-size:0.65rem;color:var(--gold);cursor:pointer;vertical-align:middle;
}
.follow-pill.following{background:rgba(201,168,76,0.4);}
.short-caption{font-size:0.85rem;line-height:1.5;color:rgba(255,255,255,0.95);margin-bottom:0.5rem;}
.short-caption .hashtag{color:var(--gold-l);}
.short-tags{display:flex;flex-wrap:wrap;gap:0.35rem;margin-top:0.3rem;}
.short-tag{font-size:0.7rem;color:var(--gold-l);}

/* ─── MUSIC TICKER ─── */
.music-ticker{
  display:flex;align-items:center;gap:0.5rem;
  margin-top:0.6rem;
}
.music-disc{
  width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;
  font-size:0.8rem;animation:spin 3s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}
.music-text{font-size:0.72rem;color:rgba(255,255,255,0.75);overflow:hidden;white-space:nowrap;}
.music-scroll{display:inline-block;animation:tickerScroll 8s linear infinite;}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ─── RIGHT ACTION BAR ─── */
.short-actions{
  position:absolute;bottom:90px;right:0.75rem;z-index:3;
  display:flex;flex-direction:column;align-items:center;gap:1.2rem;
}
.action{display:flex;flex-direction:column;align-items:center;gap:0.2rem;cursor:pointer;}
.action-icon{
  width:46px;height:46px;border-radius:50%;
  background:rgba(0,0,0,0.4);backdrop-filter:blur(6px);
  border:0.5px solid rgba(255,255,255,0.12);
  display:flex;align-items:center;justify-content:center;
  font-size:1.35rem;transition:all 0.18s;
  position:relative;
}
.action-icon:active{transform:scale(0.88);}
.action-count{font-size:0.68rem;color:rgba(255,255,255,0.75);}
.action.liked .action-icon{background:rgba(226,75,74,0.25);border-color:var(--red);}
.action.liked .action-icon::after{content:'';position:absolute;inset:-4px;border-radius:50%;animation:likeRing 0.4s ease forwards;}
@keyframes likeRing{0%{box-shadow:0 0 0 0 rgba(226,75,74,0.5)}100%{box-shadow:0 0 0 12px rgba(226,75,74,0)}}

/* heart burst animation */
.heart-burst{
  position:absolute;font-size:4rem;
  pointer-events:none;z-index:10;
  animation:heartBurst 0.8s ease forwards;
  top:50%;left:50%;transform:translate(-50%,-50%);
}
@keyframes heartBurst{
  0%{opacity:1;transform:translate(-50%,-50%) scale(0.5)}
  40%{opacity:1;transform:translate(-50%,-50%) scale(1.4)}
  100%{opacity:0;transform:translate(-50%,-60%) scale(1.6)}
}

/* channel avatar rotating ring on actions */
.action-avatar-wrap{position:relative;cursor:pointer;}
.action-avatar{
  width:46px;height:46px;border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:2px solid #fff;
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
  overflow:hidden;
}
.action-avatar-plus{
  position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);
  width:18px;height:18px;border-radius:50%;background:var(--red);
  border:1.5px solid #000;display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;font-weight:900;
}

/* ─── PROGRESS DOTS ─── */
.progress-dots{
  position:fixed;right:6px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:5px;z-index:40;
}
.prog-dot{
  width:3px;height:3px;border-radius:2px;background:rgba(255,255,255,0.25);
  transition:all 0.3s;
}
.prog-dot.active{height:16px;background:var(--gold);border-radius:2px;}

/* ─── PAUSE INDICATOR ─── */
.pause-indicator{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:3rem;z-index:5;
  opacity:0;transition:opacity 0.15s;pointer-events:none;
}
.pause-indicator.show{opacity:1;}

/* ─── COMMENTS DRAWER ─── */
.comments-drawer{
  position:fixed;bottom:0;left:0;right:0;z-index:80;
  height:65vh;background:rgba(10,10,15,0.97);
  backdrop-filter:blur(16px);
  border-top:0.5px solid rgba(201,168,76,0.25);
  border-radius:20px 20px 0 0;
  transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
  display:flex;flex-direction:column;
}
.comments-drawer.open{transform:translateY(0);}
.drawer-handle{width:36px;height:3px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0.75rem auto 0;}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem 0.5rem;}
.drawer-title{font-size:0.9rem;color:rgba(255,255,255,0.9);}
.drawer-close{background:none;border:none;color:rgba(255,255,255,0.5);font-size:1.1rem;cursor:pointer;}
.comments-list{flex:1;overflow-y:auto;padding:0.5rem 1rem;scrollbar-width:none;}
.comments-list::-webkit-scrollbar{display:none;}
.comment{display:flex;gap:0.6rem;margin-bottom:1rem;}
.c-avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.c-body{flex:1;}
.c-nick{font-size:0.78rem;color:var(--gold-l);margin-bottom:0.15rem;}
.c-text{font-size:0.83rem;color:rgba(255,255,255,0.9);line-height:1.4;}
.c-meta{display:flex;align-items:center;gap:0.75rem;margin-top:0.25rem;}
.c-time{font-size:0.65rem;color:rgba(255,255,255,0.35);}
.c-like{font-size:0.65rem;color:rgba(255,255,255,0.4);cursor:pointer;}
.c-reply-btn{font-size:0.65rem;color:rgba(255,255,255,0.4);cursor:pointer;border:none;background:none;font-family:inherit;}
.comment-input-row{
  display:flex;align-items:center;gap:0.6rem;
  padding:0.75rem 1rem max(0.75rem,env(safe-area-inset-bottom));
  border-top:0.5px solid rgba(255,255,255,0.06);
}
.comment-input{
  flex:1;padding:0.55rem 1rem;
  background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);
  border-radius:20px;color:#fff;font-size:0.85rem;font-family:inherit;outline:none;
}
.comment-input::placeholder{color:rgba(255,255,255,0.3);}
.comment-send{
  width:36px;height:36px;border-radius:50%;
  background:var(--gold-d);border:none;color:#1a1208;font-size:1rem;
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
  transition:all 0.2s;
}
.comment-send:active{transform:scale(0.9);}

/* ─── UPLOAD MODAL ─── */
.upload-modal{
  position:fixed;inset:0;z-index:90;background:rgba(0,0,0,0.85);
  display:none;align-items:flex-end;justify-content:center;
}
.upload-modal.open{display:flex;}
.upload-sheet{
  background:#13131A;border-radius:20px 20px 0 0;
  border:0.5px solid rgba(201,168,76,0.25);
  padding:1.5rem 1.5rem max(1.5rem,env(safe-area-inset-bottom));
  width:100%;max-width:500px;
}
.upload-title{font-size:1rem;text-align:center;margin-bottom:1.25rem;color:var(--gold);}
.upload-options{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1rem;}
.upload-opt{
  background:rgba(255,255,255,0.04);border:0.5px solid rgba(201,168,76,0.2);
  border-radius:12px;padding:1.25rem 0.75rem;text-align:center;cursor:pointer;
  transition:all 0.2s;
}
.upload-opt:hover{border-color:var(--gold);background:rgba(201,168,76,0.06);}
.upload-opt-icon{font-size:2rem;margin-bottom:0.4rem;}
.upload-opt-label{font-size:0.78rem;color:rgba(255,255,255,0.7);}
.upload-cancel{
  width:100%;padding:0.75rem;background:transparent;border:0.5px solid rgba(255,255,255,0.1);
  border-radius:10px;color:rgba(255,255,255,0.5);font-size:0.85rem;cursor:pointer;font-family:inherit;
}

/* ─── BOTTOM NAV ─── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:60;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);
  border-top:0.5px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:space-around;
  padding:0.6rem 0 max(0.6rem,env(safe-area-inset-bottom));
}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:0.2rem;cursor:pointer;padding:0.3rem 0.75rem;flex:1;}
.nav-icon{font-size:1.25rem;}
.nav-label{font-size:0.58rem;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.4);}
.nav-item.active .nav-label{color:var(--gold);}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">👑 YID PLUS</div>
  <div class="topbar-title">Shorts</div>
  <div class="upload-btn" onclick="openUpload()">＋</div>
</div>

<!-- PROGRESS DOTS -->
<div class="progress-dots" id="prog-dots"></div>

<!-- SWIPE CONTAINER -->
<div class="swipe-container" id="swipe">
  <!-- Slides injected by JS -->
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item" onclick="setNav(this)"><div class="nav-icon">🏠</div><div class="nav-label">Home</div></div>
  <div class="nav-item active" onclick="setNav(this)"><div class="nav-icon">🎬</div><div class="nav-label">Shorts</div></div>
  <div class="nav-item" onclick="setNav(this)"><div class="nav-icon">🎵</div><div class="nav-label">Music</div></div>
  <div class="nav-item" onclick="setNav(this)"><div class="nav-icon">💬</div><div class="nav-label">Chats</div></div>
  <div class="nav-item" onclick="setNav(this)"><div class="nav-icon">⚙️</div><div class="nav-label">Settings</div></div>
</div>

<!-- COMMENTS DRAWER -->
<div class="comments-drawer" id="comments-drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <div class="drawer-title">💬 Comments <span id="comment-count" style="color:rgba(255,255,255,0.4);font-size:0.8rem"></span></div>
    <button class="drawer-close" onclick="closeComments()">✕</button>
  </div>
  <div class="comments-list" id="comments-list"></div>
  <div class="comment-input-row">
    <input class="comment-input" id="comment-input" placeholder="Add a comment..." maxlength="200">
    <button class="comment-send" onclick="sendComment()">➤</button>
  </div>
</div>

<!-- UPLOAD MODAL -->
<div class="upload-modal" id="upload-modal" onclick="closeUpload(event)">
  <div class="upload-sheet">
    <div class="upload-title">Upload a Short</div>
    <div class="upload-options">
      <div class="upload-opt" onclick="triggerFileUpload()">
        <div class="upload-opt-icon">📁</div>
        <div class="upload-opt-label">Choose from Library</div>
      </div>
      <div class="upload-opt" onclick="alert('Camera not available in browser preview')">
        <div class="upload-opt-icon">📷</div>
        <div class="upload-opt-label">Record with Camera</div>
      </div>
    </div>
    <button class="upload-cancel" onclick="closeUpload()">Cancel</button>
    <input type="file" id="file-input" accept="video/*" style="display:none" onchange="handleUpload(event)">
  </div>
</div>

<script>
/* ─── SHORT DATA ─── */
const SHORTS_DATA = [
  {
    nick:"MosheMusic", emoji:"🎹", bg:"#0d0010", verified:true,
    caption:"New niggun I composed last night… couldn't sleep 🌙✨",
    tags:["#JewishMusic","#Niggun","#YidPlus"],
    music:"Original Composition — Moshe Levi",
    likes:12400, comments:[
      {nick:"ShlomoBeats",emoji:"🎤",text:"This is incredible!! 🔥🔥",time:"5m",likes:42},
      {nick:"RebbeVibes",emoji:"📖",text:"Made me cry. Truly holy music.",time:"12m",likes:18},
      {nick:"YidFan99",emoji:"😊",text:"My new favorite! Sharing this everywhere",time:"23m",likes:7},
    ]
  },
  {
    nick:"YidDancer", emoji:"🕺", bg:"#001020", verified:false,
    caption:"Traditional wedding dance tutorial — Part 3! Who asked for more? 💃🎶",
    tags:["#JewishDance","#Wedding","#Tutorial"],
    music:"Classic Hora — Traditional",
    likes:8700, comments:[
      {nick:"KosherFit",emoji:"💪",text:"Teaching this at my next class!!",time:"2m",likes:31},
      {nick:"MiriamDances",emoji:"🌸",text:"Finally someone showing the real moves",time:"8m",likes:15},
    ]
  },
  {
    nick:"KosherChef", emoji:"🥘", bg:"#200800", verified:true,
    caption:"Friday cholent recipe — my bubby's secret ingredient REVEALED 👨‍🍳🔥",
    tags:["#KosherFood","#Cholent","#Shabbos"],
    music:"Shabbos Vibes — YidPlus Radio",
    likes:22300, comments:[
      {nick:"YidFoodieNY",emoji:"🍕",text:"FINALLY the secret is out 😂❤️",time:"1m",likes:89},
      {nick:"ShabbosLover",emoji:"✡️",text:"Making this Friday for sure!",time:"3m",likes:44},
      {nick:"RebbeVibes",emoji:"📖",text:"Looks absolutely delicious. Yasher koach!",time:"7m",likes:22},
      {nick:"BubbyFan",emoji:"👵",text:"Reminds me of my grandmother's cholent 😭",time:"15m",likes:11},
    ]
  },
  {
    nick:"ShlomoBeats", emoji:"🎤", bg:"#100020", verified:true,
    caption:"Surprise studio session! New single dropping NEXT WEEK 🎵🎙️",
    tags:["#JewishMusic","#NewMusic","#StudioLife"],
    music:"Unreleased Track — ShlomoBeats",
    likes:31500, comments:[
      {nick:"MosheMusic",emoji:"🎹",text:"Can't wait to hear the full thing!!",time:"4m",likes:203},
      {nick:"YidFan99",emoji:"😊",text:"Already set a reminder 🙌",time:"9m",likes:67},
    ]
  },
  {
    nick:"RebbeVibes", emoji:"📖", bg:"#001510", verified:true,
    caption:"Quick Torah thought — why Shabbos is the source of all blessing 🕯️",
    tags:["#Torah","#Shabbos","#JewishWisdom"],
    music:"Peaceful Shabbos — YidPlus Radio",
    likes:18900, comments:[
      {nick:"ShlomoBeats",emoji:"🎤",text:"Always so inspiring. Thank you Rebbe!",time:"2m",likes:55},
      {nick:"MiriamDances",emoji:"🌸",text:"Sharing this with my whole family",time:"6m",likes:28},
    ]
  },
];

let currentIdx = 0;
let likedSet = new Set();
let followSet = new Set();
let localComments = SHORTS_DATA.map(s => [...s.comments]);
let drawerOpen = false;
let pauseTimeout = null;

/* ─── BUILD SLIDES ─── */
const swipe = document.getElementById('swipe');
const dotsContainer = document.getElementById('prog-dots');

SHORTS_DATA.forEach((s, i) => {
  /* progress dot */
  const dot = document.createElement('div');
  dot.className = 'prog-dot' + (i===0?' active':'');
  dotsContainer.appendChild(dot);

  /* slide */
  const slide = document.createElement('div');
  slide.className = 'short';
  slide.dataset.idx = i;

  const tagsHTML = s.tags.map(t=>`<span class="short-tag">${t}</span>`).join('');
  const musicStr = s.music + ' • ' + s.music + ' • ';

  slide.innerHTML = `
    <div class="short-bg">${s.emoji}</div>
    <div class="short-emoji-center">${s.emoji}</div>
    <div class="short-gradient"></div>
    <div class="pause-indicator" id="pause-${i}">⏸</div>

    <div class="short-info">
      <div class="short-channel" onclick="goChannel('${s.nick}')">
        <div class="short-avatar">${s.emoji}</div>
        <span class="short-nick">@${s.nick}</span>
        ${s.verified?'<span class="verified">👑</span>':''}
        <span class="follow-pill" id="fpill-${i}" onclick="event.stopPropagation();toggleFollow(${i})">+ Follow</span>
      </div>
      <div class="short-caption">${s.caption}</div>
      <div class="short-tags">${tagsHTML}</div>
      <div class="music-ticker">
        <div class="music-disc">🎵</div>
        <div class="music-text"><span class="music-scroll">${musicStr}${musicStr}</span></div>
      </div>
    </div>

    <div class="short-actions">
      <div class="action-avatar-wrap" onclick="goChannel('${s.nick}')">
        <div class="action-avatar">${s.emoji}</div>
        <div class="action-avatar-plus">+</div>
      </div>
      <div class="action" id="like-${i}" onclick="toggleLike(${i})">
        <div class="action-icon">🤍</div>
        <div class="action-count" id="like-count-${i}">${fmtNum(s.likes)}</div>
      </div>
      <div class="action" onclick="openComments(${i})">
        <div class="action-icon">💬</div>
        <div class="action-count">${fmtNum(s.comments.length)}</div>
      </div>
      <div class="action" onclick="shareShort(${i})">
        <div class="action-icon">📤</div>
        <div class="action-count">Share</div>
      </div>
      <div class="action" onclick="toggleBookmark(this)">
        <div class="action-icon" id="bm-${i}">🔖</div>
        <div class="action-count">Save</div>
      </div>
    </div>
  `;

  /* double-tap to like */
  let lastTap = 0;
  slide.addEventListener('touchstart', (e) => {
    const now = Date.now();
    if (now - lastTap < 300) {
      doubleTapLike(i, e.touches[0]);
    }
    lastTap = now;
  });
  slide.addEventListener('dblclick', (e) => doubleTapLike(i, e));

  /* long press to pause */
  let holdTimer = null;
  slide.addEventListener('touchstart', () => {
    holdTimer = setTimeout(() => {
      document.getElementById('pause-'+i).classList.add('show');
    }, 150);
  }, {passive:true});
  slide.addEventListener('touchend', () => {
    clearTimeout(holdTimer);
    document.getElementById('pause-'+i).classList.remove('show');
  });

  swipe.appendChild(slide);
});

/* ─── SCROLL SNAP DETECTION ─── */
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
      const idx = parseInt(entry.target.dataset.idx);
      currentIdx = idx;
      document.querySelectorAll('.prog-dot').forEach((d,i) => d.classList.toggle('active', i===idx));
    }
  });
}, {threshold: 0.6});

document.querySelectorAll('.short').forEach(s => observer.observe(s));

/* ─── DOUBLE TAP LIKE ─── */
function doubleTapLike(i, pos) {
  if (!likedSet.has(i)) toggleLike(i);
  const burst = document.createElement('div');
  burst.className = 'heart-burst';
  burst.textContent = '❤️';
  const slide = document.querySelectorAll('.short')[i];
  slide.appendChild(burst);
  setTimeout(() => burst.remove(), 900);
}

/* ─── LIKE ─── */
function toggleLike(i) {
  const el = document.getElementById('like-'+i);
  const icon = el.querySelector('.action-icon');
  const count = document.getElementById('like-count-'+i);
  const liked = likedSet.has(i);
  if (liked) {
    likedSet.delete(i);
    icon.textContent = '🤍';
    el.classList.remove('liked');
    count.textContent = fmtNum(SHORTS_DATA[i].likes);
  } else {
    likedSet.add(i);
    icon.textContent = '❤️';
    el.classList.add('liked');
    count.textContent = fmtNum(SHORTS_DATA[i].likes + 1);
  }
}

/* ─── FOLLOW ─── */
function toggleFollow(i) {
  const pill = document.getElementById('fpill-'+i);
  const followed = followSet.has(i);
  if (followed) { followSet.delete(i); pill.textContent='+ Follow'; pill.classList.remove('following'); }
  else { followSet.add(i); pill.textContent='✓ Following'; pill.classList.add('following'); }
}

/* ─── BOOKMARK ─── */
function toggleBookmark(action) {
  const icon = action.querySelector('.action-icon');
  icon.textContent = icon.textContent === '🔖' ? '⭐' : '🔖';
}

/* ─── CHANNEL NAV ─── */
function goChannel(nick) { alert(`Opening channel: @${nick}`); }

/* ─── SHARE ─── */
function shareShort(i) {
  if (navigator.share) {
    navigator.share({title:'YID PLUS Short', text:'Check out this short on YID PLUS!', url: window.location.href});
  } else {
    alert('Share link copied!\nyidplus.com/shorts/' + i);
  }
}

/* ─── COMMENTS ─── */
function openComments(idx) {
  currentIdx = idx;
  drawerOpen = true;
  const list = document.getElementById('comments-list');
  const comments = localComments[idx];
  document.getElementById('comment-count').textContent = `(${comments.length})`;
  list.innerHTML = '';
  comments.forEach(c => {
    const div = document.createElement('div');
    div.className = 'comment';
    div.innerHTML = `
      <div class="c-avatar">${c.emoji||'😊'}</div>
      <div class="c-body">
        <div class="c-nick">@${c.nick}</div>
        <div class="c-text">${c.text}</div>
        <div class="c-meta">
          <span class="c-time">${c.time}</span>
          <span class="c-like" onclick="this.textContent=this.textContent==='❤️ '+${c.likes}?'🤍 ${c.likes}':'❤️ ${c.likes}'">🤍 ${c.likes}</span>
          <button class="c-reply-btn">Reply</button>
        </div>
      </div>`;
    list.appendChild(div);
  });
  document.getElementById('comments-drawer').classList.add('open');
}

function closeComments() {
  document.getElementById('comments-drawer').classList.remove('open');
  drawerOpen = false;
}

function sendComment() {
  const input = document.getElementById('comment-input');
  const text = input.value.trim();
  if (!text) return;
  const newComment = {nick:'Me', emoji:'👤', text, time:'just now', likes:0};
  localComments[currentIdx].push(newComment);
  SHORTS_DATA[currentIdx].comments.push(newComment);
  input.value = '';
  openComments(currentIdx);
}

/* ─── UPLOAD ─── */
function openUpload() { document.getElementById('upload-modal').classList.add('open'); }
function closeUpload(e) {
  if (!e || e.target === document.getElementById('upload-modal')) {
    document.getElementById('upload-modal').classList.remove('open');
  }
}
function triggerFileUpload() { document.getElementById('file-input').click(); }
function handleUpload(e) {
  const file = e.target.files[0];
  if (file) {
    closeUpload();
    alert(`Uploading "${file.name}" to Firebase Storage...\n\n✅ Video uploaded!\n✅ Added to your channel Shorts tab automatically.`);
  }
}

/* ─── NAV ─── */
function setNav(el) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
}

/* ─── UTILS ─── */
function fmtNum(n) {
  if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'') + 'K';
  return n;
}
</script>
